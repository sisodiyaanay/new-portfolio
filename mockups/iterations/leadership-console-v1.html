<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Path-level breakdown <span class=\"ip-card-sub\">Verification activity by code-path type<\u002Fspan><\u002Fdiv>\n          <table class=\"btbl\">\n            <thead><tr><th>Path type<\u002Fth><th>Sessions<\u002Fth><th>Verification rate<\u002Fth><th>Citation rate<\u002Fth><th>Avg turns<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr><td class=\"bold\">Compliance-tier code<\u002Ftd><td class=\"mono\">214<\u002Ftd><td><div style=\"display:flex;align-items:center;gap:6px\"><div class=\"br-trk\" style=\"width:60px;flex:none\"><div class=\"br-fil\" style=\"width:84%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"mono\">84%<\u002Fspan><\u002Fdiv><\u002Ftd><td class=\"mono\">91%<\u002Ftd><td class=\"mono\">11.2<\u002Ftd><\u002Ftr>\n              <tr><td class=\"bold\">Sensitive (PII/auth)<\u002Ftd><td class=\"mono\">141<\u002Ftd><td><div style=\"display:flex;align-items:center;gap:6px\"><div class=\"br-trk\" style=\"width:60px;flex:none\"><div class=\"br-fil\" style=\"width:78%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"mono\">78%<\u002Fspan><\u002Fdiv><\u002Ftd><td class=\"mono\">82%<\u002Ftd><td class=\"mono\">9.4<\u002Ftd><\u002Ftr>\n              <tr><td class=\"bold\">General business logic<\u002Ftd><td class=\"mono\">312<\u002Ftd><td><div style=\"display:flex;align-items:center;gap:6px\"><div class=\"br-trk\" style=\"width:60px;flex:none\"><div class=\"br-fil\" style=\"width:52%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"mono\">52%<\u002Fspan><\u002Fdiv><\u002Ftd><td class=\"mono\">38%<\u002Ftd><td class=\"mono\">6.8<\u002Ftd><\u002Ftr>\n              <tr><td class=\"bold\">Neutral utility<\u002Ftd><td class=\"mono\">180<\u002Ftd><td><div style=\"display:flex;align-items:center;gap:6px\"><div class=\"br-trk\" style=\"width:60px;flex:none\"><div class=\"br-fil\" style=\"width:46%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"mono\">46%<\u002Fspan><\u002Fdiv><\u002Ftd><td class=\"mono\">22%<\u002Ftd><td class=\"mono\">5.2<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n          <div class=\"tc-foot\">Ratio = (Compliance + Sensitive avg) / (General + Neutral avg) = 81% / 49% = 1.84×<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n          <div class=\"ip-text\">\n            <p>Second Brain classifies every session by the type of code path being touched. Classification uses repository conventions (file paths matching known compliance directories), commit message tags, and the AI's own inference about what the session is doing.<\u002Fp>\n            <p><strong>Verification rate<\u002Fstrong> = sessions where the engineer either cross-checked the AI output against a source, ran tests on suggested code, or explicitly verified intermediate steps. <strong>Citation rate<\u002Fstrong> = sessions where the AI was asked to ground claims in a specific source.<\u002Fp>\n            <p>The <strong>ratio<\u002Fstrong> is the multiplier between compliance-path verification and neutral-path verification. A healthy team has ratio &gt;1.2× — they slow down on the things that matter. A ratio &lt;1× means rigor is reversed: an audit-time disaster.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">1<\u002Fdiv><div class=\"ai-text\"><strong>Lift General business logic and Neutral path verification rates.<\u002Fstrong> At 52% and 46% respectively, these paths cover the majority of sessions but receive the least rigor. Even a modest 10pp improvement across these paths compresses the ratio gap and reduces audit surface area at scale.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">2<\u002Fdiv><div class=\"ai-text\"><strong>Document the Friday review template that lifted the ratio.<\u002Fstrong> The change to the prompt template that asks the AI to flag uncertainty on compliance paths shifted behavior measurably. Add it to the prompt library and standardise.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">3<\u002Fdiv><div class=\"ai-text\"><strong>Tie this metric to the ISO 42001 audit narrative.<\u002Fstrong> Control 8.2 (output verification) maps directly to this signal. Auditors prefer behavioural evidence over policy documents — this is exactly that.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">This week<\u002Fspan><span class=\"rc-row-r\">1.84×<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Last week<\u002Fspan><span class=\"rc-row-r\">1.64×<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">30-day avg<\u002Fspan><span class=\"rc-row-r\">1.72×<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">90-day low<\u002Fspan><span class=\"rc-row-r\">1.31×<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Threshold<\u002Fspan><span class=\"rc-row-r\">1.20×<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-18','Command center','ISO 42001 / SOC 2 audit readiness')\">Audit readiness score<\u002Fli>\n            <li onclick=\"nav('view-intel-33','Command center','Secret &amp; credential leakage')\">Credential leakage<\u002Fli>\n            <li onclick=\"nav('view-compliance','Intelligences','Compliance &amp; risk')\">Compliance &amp; risk section<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n  <!-- ══════════ INTEL #4 — STUCK WARNING ══════════ -->\n  <div id=\"view-intel-4\" class=\"pv\">\n  <div class=\"page\">\n    <div class=\"ip-header\">\n      <div>\n        <h1 class=\"ip-title\">Stuck-person early warning<\u002Fh1>\n        <div class=\"ip-badges\"><span class=\"b ba\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot dim\"><\u002Fdiv><\u002Fdiv>Watch<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      \n    <\u002Fdiv>\n    <p class=\"ip-desc\">Aggregate density of engineers thrashing in real time — re-prompting loops, abandoned threads, repeated false starts. No individual identification. EM gets a cohort signal, never a name. Surfaces help-routing opportunities before someone burns half a day.<\u002Fp>\n    <div class=\"ip-hero\">\n      <div class=\"ip-hero-l\">\n        <div class=\"ip-hero-val\">12<span class=\"ip-hero-unit\">%<\u002Fspan><\u002Fdiv>\n        <div class=\"ip-hero-tag ba\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot dim\"><\u002Fdiv><\u002Fdiv>11 of 127 engineers · improving<\u002Fdiv>\n        <div class=\"ip-hero-note\">Threshold: above 20% triggers EM notification · current trend is downward · cohort-min 3 enforced<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ip-hero-r\">\n        <span class=\"ip-hero-rlbl\">7-day trend<\u002Fspan><span class=\"ip-hero-trend\">↓ −3pp vs last week<\u002Fspan>\n        <span class=\"ip-hero-rlbl\" style=\"margin-top:6px\">Peak this week<\u002Fspan><span class=\"ip-hero-trend\" style=\"color:var(--t2)\">18% (Tue 14:30)<\u002Fspan>\n        <svg viewBox=\"0 0 110 32\" style=\"display:block;width:110px;height:32px;margin-top:10px\" preserveAspectRatio=\"none\">\n          <path d=\"M 0,14 L 16,8 L 32,16 L 48,22 L 64,26 L 80,24 L 96,20 L 110,20\" fill=\"none\" stroke=\"#18181B\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath>\n          <path d=\"M 0,14 L 16,8 L 32,16 L 48,22 L 64,26 L 80,24 L 96,20 L 110,20 L 110,32 L 0,32 Z\" fill=\"#18181B\" fill-opacity=\"0.08\"><\u002Fpath>\n          <circle cx=\"110\" cy=\"20\" r=\"3\" fill=\"#18181B\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ip-layout\">\n      <div class=\"ip-main\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">7-day stuck density <span class=\"ip-card-sub\">Daily % of engineers showing thrash patterns<\u002Fspan><\u002Fdiv>\n          <svg viewBox=\"0 0 520 160\" style=\"display:block;width:100%;height:160px;overflow:visible\">\n            <!-- grid lines -->\n            <g stroke=\"#E4E4E7\" stroke-width=\"1\">\n              <line x1=\"36\" y1=\"25\" x2=\"500\" y2=\"25\"><\u002Fline>\n              <line x1=\"36\" y1=\"58\" x2=\"500\" y2=\"58\"><\u002Fline>\n              <line x1=\"36\" y1=\"91\" x2=\"500\" y2=\"91\"><\u002Fline>\n              <line x1=\"36\" y1=\"124\" x2=\"500\" y2=\"124\"><\u002Fline>\n            <\u002Fg>\n            <!-- y labels -->\n            <g font-family=\"Geist Mono,monospace\" font-size=\"9\" fill=\"#A1A1AA\" text-anchor=\"end\">\n              <text x=\"32\" y=\"29\">25%<\u002Ftext>\n              <text x=\"32\" y=\"62\">20%<\u002Ftext>\n              <text x=\"32\" y=\"95\">15%<\u002Ftext>\n              <text x=\"32\" y=\"128\">10%<\u002Ftext>\n            <\u002Fg>\n            <!-- threshold line at 20% = y=58 -->\n            <line x1=\"36\" y1=\"58\" x2=\"500\" y2=\"58\" stroke=\"#F59E0B\" stroke-width=\"1.5\" stroke-dasharray=\"4 3\" opacity=\"0.8\"><\u002Fline>\n            <text x=\"504\" y=\"61\" font-family=\"Geist Mono,monospace\" font-size=\"9\" fill=\"#F59E0B\" font-weight=\"600\">20% cap<\u002Ftext>\n            <!-- x labels -->\n            <g font-family=\"Geist Mono,monospace\" font-size=\"9\" fill=\"#A1A th:72%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">91 engineers<\u002Fspan><span class=\"bbr-pct\">72%<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Stuck (thrashing)<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:12%;background:#71717A\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">15 engineers<\u002Fspan><span class=\"bbr-pct\">12%<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Idle / not active<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:16%;background:#71717A\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">20 engineers<\u002Fspan><span class=\"bbr-pct\">16%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Time-of-day pattern <span class=\"ip-card-sub\">When thrashing peaks<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">09:00–11:00<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:18%;background:#71717A\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">low<\u002Fspan><span class=\"bbr-pct\">7%<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">11:00–13:00<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:32%;background:#52525B;background:#A1A1AA\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">moderate<\u002Fspan><span class=\"bbr-pct\">11%<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">14:00–17:00<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:62%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">peak<\u002Fspan><span class=\"bbr-pct\">21%<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">17:00–19:00<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:28%;background:#52525B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">moderate<\u002Fspan><span class=\"bbr-pct\">9%<\u002Fspan><\u002Fdiv>\n          <div class=\"tc-foot\">Mid-afternoon thrash is the consistent pattern. Could indicate cognitive load saturation, decision fatigue, or unstructured afternoon work.<\u002Fdiv>\n        <\u002Fdiv>\n                <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n                  <div class=\"ip-text\"><p>Second Brain monitors session-level signals for stuck-loop behaviour across a rolling 7-day window. Signals include: repeated prompts with no forward progression, error rate escalation over sequential turns, circular conversation patterns (returning to the same question without resolution), and session abandonment without a verified output.<\u002Fp><p>Each engineer receives a daily session-quality score (0–10). Engineers scoring below the stuck threshold (session quality &lt;4/10 for 3 or more consecutive days) are flagged. Stuck density = flagged engineers ÷ total active engineers.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n                <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">1<\u002Fdiv><div class=\"ai-text\"><strong>Examine the 14:00–17:00 spike.<\u002Fstrong> If teams have unstructured afternoon work or unclear handoffs after lunch, this is your structural lever. A 15-minute afternoon stand-up might collapse the spike.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">2<\u002Fdiv><div class=\"ai-text\"><strong>Reinforce Wednesday's design review pattern.<\u002Fstrong> The trend turned downward after Wednesday's mid-week sync — that's a useful structural artefact worth repeating.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon a\">3<\u002Fdiv><div class=\"ai-text\"><strong>Do not call anyone out.<\u002Fstrong> The cohort signal exists precisely so you don't need to. Structural fixes outperform individual intervention here.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      \n        <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Current<\u002Fspan><span class=\"rc-row-r\">12%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Last week avg<\u002Fspan><span class=\"rc-row-r\">15%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">30-day avg<\u002Fspan><span class=\"rc-row-r\">14%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Threshold<\u002Fspan><span class=\"rc-row-r\">20%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Cohort min<\u002Fspan><span class=\"rc-row-r\">3 engineers<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-25','Command center','Late-iteration convergence &amp; resilience')\">Resilience &amp; convergence<\u002Fli>\n            <li onclick=\"nav('view-intel-6','Command center','AI literacy &amp; skill distribution')\">AI literacy distribution<\u002Fli>\n            <li onclick=\"nav('view-people','Intelligences','People &amp; capability')\">People &amp; capability section<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n  <!-- ══════════ INTEL #6 — AI LITERACY ══════════ -->\n  <div id=\"view-intel-6\" class=\"pv\">\n  <div class=\"page\">\n    <div class=\"ip-header\">\n      <div>\n        <h1 class=\"ip-title\">AI literacy &amp; skill distribution<\u002Fh1>\n        <div class=\"ip-badges\"><span class=\"b bt\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot\"> <\u002Fspan>&lt;4.0 Critical<\u002Fspan>\n<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">30-day cohort evolution <span class=\"ip-card-sub\">AI literacy band movement · last 30 days<\u002Fspan><\u002Fdiv>\n          <div class=\"ip-text\">\n            <p><strong>2 engineers advanced from Developing → Proficient<\u002Fstrong> this month. Both completed the internal \"session depth\" coaching program in March. Their session-turn averages went from 5.1 to 9.3 over 30 days.<\u002Fp>\n            <p><strong>1 engineer advanced from Foundational → Developing.<\u002Fstrong> Self-directed — picked up the prompt library and applied it consistently.<\u002Fp>\n            <p><strong>No regressions.<\u002Fstrong> No engineer dropped a band over the last 30 days. Distribution is steadily improving.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Hiring &amp; capability implications <span class=\"ip-card-sub\">Based on literacy distribution<\u002Fspan><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">1<\u002Fdiv><div class=\"ai-text\"><strong>Hiring profile: bias for agentic adoption.<\u002Fstrong> The team's weakest dimension is the right hiring filter. Adding 2 strong agentic-pattern engineers shifts the org's median in one quarter.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">2<\u002Fdiv><div class=\"ai-text\"><strong>Capability criteria are already visible in this data.<\u002Fstrong> The 22 AI-Native engineers all score 8+ on 15 of 25 dimensions. That's a clean evidence-based depth bar.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">3<\u002Fdiv><div class=\"ai-text\"><strong>Coach the Foundational band with the proven path.<\u002Fstrong> The 1 engineer who advanced from Foundational → Developing did it through self-directed adoption of the prompt library. Run the same approach deliberately with the remaining 20 engineers in the Foundational band.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      \n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n                  <div class=\"ip-text\"><p>Each engineer is evaluated across <strong>25 AI skill dimensions<\u002Fstrong> derived from session-level behavioural signals — covering prompt maturation, verification discipline, context engineering, iteration convergence, compliance-path rigor, domain confidence, commit quality, credential hygiene, and personal AI practice habits. Scores are normalised to a 0–10 scale per dimension.<\u002Fp><p>Band assignment is determined by overall depth score: AI-Native (≥8.5), Proficient (7.0–8.4), Developing (5.0–6.9), Foundational (&lt;5.0). The cohort minimum of 3 engineers is enforced before any band is reported.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n                  <div class=\"ip-text\"><div class=\"ai-item\"><div class=\"ai-icon \">1<\u002Fdiv><div class=\"ai-text\"><strong>Engineers in Developing band scoring above 6.5/10<\u002Fstrong> are the strongest candidates for the Proficient pathway — prioritise them for the session-depth coaching cohort.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">2<\u002Fdiv><div class=\"ai-text\"><strong>Invest in the 3 weakest dimensions org-wide<\u002Fstrong> — these represent the highest-leverage training opportunities and will move the overall depth score fastest.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon r\">!<\u002Fdiv><div class=\"ai-text\"><strong>Agentic adoption is the weakest dimension across all bands.<\u002Fstrong> Run an agentic workflow workshop before the next quarterly review to address the structural gap.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n "dot\"><\u002Fdiv><div class=\"dot dim\"><\u002Fdiv><div class=\"dot dim\"><\u002Fdiv><\u002Fdiv>Needs attention<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      \n    <\u002Fdiv>\n    <p class=\"ip-desc\">Whether mandated departments are actually using Claude Code as required — or paying lip service. Surfaces \"AI Theater\" where session counts are present but depth-of-use is shallow. Frequency alone does not equal compliance.<\u002Fp>\n    <div class=\"ip-hero\">\n      <div class=\"ip-hero-l\">\n        <div class=\"ip-hero-val\">67<span class=\"ip-hero-unit\">% adoption<\u002Fspan><\u002Fdiv>\n        <div class=\"ip-hero-tag br\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot dim\"><\u002Fdiv><div class=\"dot dim\"><\u002Fdiv><\u002Fdiv>2 of 5 departments non-compliant<\u002Fdiv>\n        <div class=\"ip-hero-note\">CEO mandate set 90 days ago. Adoption rises slowly; depth-of-use is the truer signal. 3 departments at AI-Native or Developing depth.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ip-hero-r\">\n        <span class=\"ip-hero-rlbl\">30-day trend<\u002Fspan><span class=\"ip-hero-trend\">↑ +12pp<\u002Fspan>\n        <span class=\"ip-hero-rlbl\" style=\"margin-top:6px\">Target by Q3<\u002Fspan><span class=\"ip-hero-trend\" style=\"color:var(--t2)\">85%<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ip-layout\">\n      <div class=\"ip-main\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Department scorecard <span class=\"ip-card-sub\">Sessions, depth, status<\u002Fspan><\u002Fdiv>\n          <table class=\"btbl\">\n            <thead><tr><th>Department<\u002Fth><th>Headcount<\u002Fth><th>Sessions/day<\u002Fth><th>Depth score<\u002Fth><th>30-day trend<\u002Fth><th>Status<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr><td class=\"bold\">Engineering<\u002Ftd><td class=\"mono\">24<\u002Ftd><td class=\"mono\">84<\u002Ftd><td><div style=\"display:flex;align-items:cent lass=\"mono\">8<\u002Ftd><td class=\"mono\">12<\u002Ftd><td><div style=\"display:flex;align-items:center;gap:6px\"><div class=\"br-trk\" style=\"width:50px;flex:none\"><div class=\"br-fil\" style=\"width:21%;background:#52525B\"><\u002Fdiv><\u002Fdiv><span class=\"mono\">2.1<\u002Fspan><\u002Fdiv><\u002Ftd><td class=\"mono\" style=\"color:var(--red-d)\">↓ −0.1<\u002Ftd><td><span class=\"b br\" style=\"font-size:10px\">Non-compliant ✕<\u002Fspan><\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n          <div class=\"tc-foot\">Engineering, Data, and QA are progressing well. Product shows AI Theater — high sessions but shallow use. Design is genuinely non-compliant.<\u002Fdiv>\n        <\u002Fdiv>\n                <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Compliance status guide <span class=\"ip-card-sub\">What each status means · intervention per tier<\u002Fspan><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon r\">!<\u002Fdiv><div class=\"ai-text\"><strong>Non-compliant (depth &lt;4.0):<\u002Fstrong> No functional AI workflow exists. Volume may be present but sessions are shallow and unverified. <em>Intervention:<\u002Fem> Structural fix required — pair with AI-Native team for 2 weeks, set a 60-day depth target of 5.0. Design dept is here at 2.1/10.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon a\">⚠<\u002Fdiv><div class=\"ai-text\"><strong>AI Theater (depth 4.0–5.5):<\u002Fstrong> The hard pattern to break. Volume satisfies the letter of the mandate but behaviour misses its intent — boilerplate prompts, no verification, no follow-through. <em>Intervention:<\u002Fem> Coaching, not policing. Show what AI-Native workflow looks like and tie it to specific outcomes. Product dept is here at 3.2/10.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon a\">⚠<\u002Fdiv><div class=\"ai-text\"><strong>Developing (depth 5.5–7.5):<\u002Fstrong> On the right trajectory. Engineers are building genuine depth but haven't locked in habits across all dimensions. <em>Intervention:<\u002Fem> Continue current investment, no new structural intervention needed. Re-check in 30 days. QA &amp; Data are here.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">✓<\u002Fdiv><div class=\"ai-text\"><strong>AI-Native (depth ≥7.5):<\u002Fstrong> Genuinely AI-native workflow. High verification, strong context engineering, output follow-through. <em>Intervention:<\u002Fem> None required — use this team as the internal benchmark. Their patterns are the template for the rest of the org. Engineering is here.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">How it's computed <span class=\"ip-card-sub\">Depth-of-use methodology<\u002Fspan><\u002Fdiv>\n          <div class=\"ip-text\">\n            <p>Session count alone is a weak signal. A department can have 30 sessions per day where engineers are pasting boilerplate questions without verification — that satisfies the letter of the mandate while missing its intent.<\u002Fp>\n            <p><strong>Depth score<\u002Fstrong> is a composite of: average session turns, verification rate, citation frequency, context engineering quality, and follow-through (does the AI output actually get used?). Computed as a 1–10 weighted average per session, then averaged across the department.<\u002Fp>\n            <p>A department scoring 3.2 has the volume but not the substance — that's AI Theater. A department scoring 8+ is genuinely AI-Native. Mandate compliance requires a sustained depth score ≥5.0.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n                  <div class=\"ip-text\"><div class=\"ai-item\"><div class=\"ai-icon r\">!<\u002Fdiv><div class=\"ai-text\"><strong>Design dept is non-compliant at depth 2.1/10.<\u002Fstrong> Pair with Engineering for 2 weeks to establish AI workflow patterns. No clear workflow exists today — structural fix required before coaching.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon r\">!<\u002Fdiv><div class=\"ai-text\"><strong>Product dept is showing AI Theater pattern.<\u002Fstrong> High session volume with shallow depth (3.2/10). Tie coaching to specific outcomes, not volume targets.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">2<\u002Fdiv><div class=\"ai-text\"><strong>Track depth score alongside session volume monthly.<\u002Fstrong> High volume with shallow depth is a leading indicator of mandate regression and will not self-correct without intervention.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n        <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Org adoption<\u002Fspan><span class=\"rc-row-r\">67%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Target Q3<\u002Fspan><span class=\"rc-row-r\">85%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Depth-of-use avg<\u002Fspan><span class=\"rc-row-r\">5.0/10<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Theater depts<\u002Fspan><span class=\"rc-row-r\">1 (Product)<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Non-compliant<\u002Fspan><span class=\"rc-row-r\">1 (Design)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-6','Command center','AI literacy &amp; skill distribution')\">AI literacy distribution<\u002Fli>\n            <li onclick=\"nav('view-intel-t6','Command center','AI-Native engineering culture index')\">Culture index<\u002Fli>\n            <li onclick=\"nav('view-intel-pvs','Command center','Second Brain product-value story')\">Product-value story<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n  <!-- ══════════ INTEL #16 — DOMAIN MASTERY ══════════ -->\n  <div id=\"view-intel-16\" class=\"pv\">\n  <div class=\"page\">\n    <div class=\"ip-header\">\n      <div>\n        <h1 class=\"ip-title\">Domain concept mastery map<\u002Fh1>\n        <div class=\"ip-badges\"><span class=\"b bt\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><\u002Fdiv>Strong<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      \n    <\u002Fdiv>\n    <p class=\"ip-desc\">Per-engineer working understanding of regulated domains, derived from the technical depth and accuracy of their session interactions with domain concepts. The signal that staffs the next engagement correctly.<\u002Fp>\n    <div class=\"ip-hero\">\n      <div class=\"ip-hero-l\">\n        <div class=\"ip-hero-val\">72<span class=\"ip-hero-unit\">% peak<\u002Fspan><\u002Fdiv>\n        <div class=\"ip-hero-tag bt\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><\u002Fdiv>Cloud Infra — strongest domain<\u002Fdiv>\n        <div class=\"ip-hero-note\">6 domains tracked · cohort min 3 enforced · gap risk auto-flagged when no engagements possible<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ip-hero-r\">\n        <span class=\"ip-hero-rlbl\">Strongest domain<\u002Fspan><span class=\"ip-hero-trend\">Cloud Infra · 72%<\u002Fspan>\n        <span class=\"ip-hero-rlbl\" style=\"margin-top:6px\">Weakest domain<\u002Fspan><span class=\"ip-hero-trend\" style=\"color:var(--amber-d)\">Distributed Sys. · 18%<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ip-layout\">\n span class=\"ip-card-sub\">Where the depth actually lives<\u002Fspan><\u002Fdiv>\n          <div class=\"hm\">\n            <div class=\"hm-row\"><div><\u002Fdiv><div class=\"hm-h\">Cloud Infra<\u002Fdiv><div class=\"hm-h\">Cybersecurity<\u002Fdiv><div class=\"hm-h\">Data Eng.<\u002Fdiv><div class=\"hm-h\">AI/ML<\u002Fdiv><div class=\"hm-h\">API Design<\u002Fdiv><div class=\"hm-h\">Distributed Sys.<\u002Fdiv><\u002Fdiv>\n            <div class=\"hm-row\"><span class=\"hm-rl\">Core Infra<\u002Fspan><div class=\"hm-cell\" style=\"background:#18181B\">82<\u002Fdiv><div class=\"hm-cell\" style=\"background:#52525B\">71<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A1A1AA;color:#18181B\">38<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A7F3D0;color:#18181B\">28<\u002Fdiv><div class=\"hm-cell\" style=\"background:#E2E8F0;color:#64748B\">14<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">8<\u002Fdiv><\u002Fdiv>\n            <div class=\"hm-row\"><span class=\"hm-rl\">Platform<\u002Fspan><div class=\"hm-cell\" style=\"background:#52525B\">68<\u002Fdiv><div class=\"hm-cell\" style=\"background:#52525B\">62<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A1A1AA;color:#18181B\">45<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A1A1AA;color:#18181B\">42<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A7F3D0;color:#18181B\">22<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">12<\u002Fdiv><\u002Fdiv>\n            <div class=\"hm-row\"><span class=\"hm-rl\">Data<\u002Fspan><div class=\"hm-cell\" style=\"background:#A1A1AA;color:#18181B\">48<\u002Fdiv><div class=\"hm-cell\" style=\"background:#52525B\">58<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A7F3D0;color:#18181B\">32<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A7F3D0;color:#18181B\">26<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F59E0B\">41<\u002Fdiv><div class=\"hm-cell\" style=\"background:#E2E8F0;color:#64748B\">18<\u002Fdiv><\u002Fdiv>\n            <div class=\"hm-row\"><span class=\"hm-rl\">Frontend<\u002Fspan><div class=\"hm-cell\" style=\"background:#A7F3D0;color:#18181B\">28<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A7F3D0;color:#18181B\">22<\u002Fdiv><div class=\"hm-cell\" style=\"background:#E2E8F0;color:#64748B\">15<\u002Fdiv><div class=\"hm-cell\" style=\"background:#E2E8F0;color:#64748B\">12<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">8<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F59E0B\">35<\u002Fdiv><\u002Fdiv>\n            <div class=\"hm-row\"><span class=\"hm-rl\">QA<\u002Fspan><div class=\"hm-cell\" style=\"background:#A1A1AA;color:#18181B\">52<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A1A1AA;color:#18181B\">48<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A7F3D0;color:#18181B\">28<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A7F3D0;color:#18181B\">24<\u002Fdiv><div class=\"hm-cell\" style=\"background:#E2E8F0;color:#64748B\">18<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">11<\u002Fdiv><\u002Fdiv>\n          <div class=\"hm-row\"><span class=\"hm-rl\">Product<\u002Fspan><div class=\"hm-cell\" style=\"background:#A1A1AA;color:#18181B\">35<\u002Fdiv><div class=\"hm-cell\" style=\"background:#A7F3D0;color:#18181B\">22<\u002Fdiv><div class=\"hm-cell\" style=\"background:#E2E8F0;color:#64748B\">14<\u002Fdiv><div class=\"hm-cell\" style=\"background:#E2E8F0;color:#64748B\">11<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">9<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">8<\u002Fdiv><\u002Fdiv>\n            <div class=\"hm-row\"><span class=\"hm-rl\">Design<\u002Fspan><div class=\"hm-cell\" style=\"background:#E2E8F0;color:#64748B\">18<\u002Fdiv><div class=\"hm-cell\" style=\"background:#E2E8F0;color:#64748B\">12<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">8<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">6<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">5<\u002Fdiv><div class=\"hm-cell\" style=\"background:#F1F5F9;color:#94A3B8\">4<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;margin-top:14px;flex-wrap:wrap\">\n            <span style=\"font-size:10px;font-family:var(--mono);color:var(--t3);flex-shrink:0\">Depth scale<\u002Fspan>\n            <div style=\"display:flex;align-items:center;gap:3px\">\n              <span style=\"width:28px;height:14px;background:#F4F4F5;border-radius:3px;display:inline-block;border:1px solid var(--border)\"><\u002Fspan>\n              <span style=\"width:28px;height:14px;background:#E4E4E7;border-radius:3px;display:inline-block\"><\u002Fspan>\n              <span style=\"width:28px;height:14px;background:#D4D4D8;border-radius:3px;display:inline-block\"><\u002Fspan>\n              <span style=\"width:28px;height:14px;background:#A1A1AA;border-radius:3px;display:inline-block\"><\u002Fspan>\n              <span style=\"width:28px;height:14px;background:#52525B;border-radius:3px;display:inline-block\"><\u002Fspan>\n              <span style=\"width:28px;height:14px;background:#18181B;border-radius:3px;display:inline-block\"><\u002Fspan>\n            <\u002Fdiv>\n            <span style=\"font-size:10px;font-family:var(--mono);color:var(--t3)\">Low → High<\u002Fspan>\n            <span style=\"width:1px;height:14px;background:var(--border);display:inline-block\"><\u002Fspan>\n            <span style=\"width:28px;height:14px;background:#FEF3C7;border-radius:3px;display:inline-block;border:1px solid #FDE68A\"><\u002Fspan>\n            <span style=\"font-size:10px;font-family:var(--mono);color:var(--t3)\">Anomaly — unexpected depth for declared role<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"tc-foot\">Cloud Infra depth concentrates in Core Infra (82%) — unexpected, since it's not their declared focus. Frontend has surprising Distributed Sys. depth (35%). Both are signals worth acting on.<\u002Fdiv>\n        <\u002Fdiv>\n              \n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n                  <div class=\"ip-text\"><p>For each of the 6 tracked domains, Second Brain scores per-engineer concept mastery by analysing domain-relevant patterns in sessions: code paths matching known domain directories, domain terminology in prompts, referenced domain documents, and cross-checking behaviour on domain-sensitive outputs.<\u002Fp><p>Domain mastery score = (verified concept coverage ÷ total domain concept set) × session confidence weight. Scores are aggregated across all engineers who have touched the domain in the 60-day window. The cohort minimum of 3 is enforced per domain.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n                  <div class=\"ip-text\"><div class=\"ai-item\"><div class=\"ai-icon r\">!<\u002Fdiv><div class=\"ai-text\"><strong>Distributed Sys. domain is critically low at 18%.<\u002Fstrong> Flag as bid-readiness risk and initiate domain onboarding for at least 2 engineers before the 30-day decision window closes.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">2<\u002Fdiv><div class=\"ai-text\"><strong>API Design is the second-thinnest domain at 26% with only 3 engineers, and the Data team carries most of it.<\u002Fstrong> Verify this depth in a 1:1 and consider formally routing API design reviews through Data team leads to spread coverage before the next engagement cycle.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">3<\u002Fdiv><div class=\"ai-text\"><strong>Review the active bid pipeline against domain coverage<\u002Fstrong> before committing to any new engagements requiring Distributed Sys. or AI/ML depth.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n        <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Domains<\u002Fspan><span class=\"rc-row-r\">6 tracked<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Engineers w/ depth<\u002Fspan><span class=\"rc-row-r\">18 of 24<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Strongest<\u002Fspan><span class=\"rc-row-r\">Cloud Infra · 72%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Weakest<\u002Fspan><span class=\"rc-row-r\">Distributed Sys. · 18%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">RFP risk flags<\u002Fspan><span class=\"rc-row-r\">1 (Distributed Sys.)<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-17','Command center','Hidden domain experts')\">Hidden experts<\u002Fli>\n            <li onclick=\"nav('view-intel-6','Command center','AI literacy &amp; skill distribution')\">AI literacy distribution<\u002Fli>\n            <li onclick=\"nav('view-domain','Intelligences','Domain &amp; knowledge')\">Domain &amp; knowledge section<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n  <!-- ══════════ INTEL #17 — HIDDEN EXPERTS ══════════ -->\n  <div id=\"view-intel-17\" class=\"pv\">\n  <div class=\"page\">\n    <div class=\"ip-header\">\n      <div>\n        <h1 class=\"ip-title\">Hidden domain experts<\u002Fh1>\n        <div class=\"ip-badges\"><span class=\"b bt\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><\u002Fdiv>Strong<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      \n    <\u002Fdiv>\n    <p class=\"ip-desc\">Real expertise based on what people actually touch — independent of title, team, or org-chart placement. Surfaces engineers operating regularly in domains they're not declared as experts in. The org chart lies. Session evidence doesn't.<\u002Fp>\n    <div class=\"ip-hero\">\n      <div class=\"ip-hero-l\">\n        <div class=\"ip-hero-val\">7<span class=\"ip-hero-unit\">hidden experts<\u002Fspan><\u002Fdiv>\n        <div class=\"ip-hero-tag bt\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><\u002Fdiv>Outside declared role · routable<\u002Fdiv>\n        <div class=\"ip-hero-note\">Identified via sustained, deep session activity in a domain over 60+ days. Cross-referenced against org-chart declared expertise.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ip-hero-r\">\n        <span class=\"ip-hero-rlbl\">Detection window<\u002Fspan><span class=\"ip-hero-trend\">60 days<\u002Fspan>\n        <span class=\"ip-hero-rlbl\" style=\"margin-top:6px\">New this month<\u002Fspan><span class=\"ip-hero-trend\">+2<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ip-layout\">\n      <div class=\"ip-main\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Expert cluster 1 <span class=\"ip-card-sub\">Cybersecurity depth in Core Infra<\u002Fspan><\u002Fdiv>\n          <div class=\"ip-text\"><p><strong>3 engineers<\u002Fstrong> on the Core Infra team show sustained, deep session activity in Cybersecurity topics — control mapping, audit trail design, evidence pack generation. None are declared as Cybersecurity specialists.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:12px\"><span style=\"display:inline-flex;align-items:center;gap:6px;background:var(--teal-l);color:var(--teal-d);border-radius:99px;padding:4px 12px;font-size:11px;font-family:var(--font);font-weight:500\"><span style=\"width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block\"><\u002Fspan>Aryan Mehta<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:6px;background:var(--teal-l);color:var(--teal-d);border-radius:99px;padding:4px 12px;font-size:11px;font-family:var(--font);font-weight:500\"><span style=\"width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block\"><\u002Fspan>Dev Patel<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:6px;background:var(--teal-l);color:var(--teal-d);border-radius:99px;padding:4px 12px;font-size:11px;font-family:var(--font);font-weight:500\"><span style=\"width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block\"><\u002Fspan>Kiran Singh<\u002Fspan><\u002Fdiv>\n          <div class=\"tc-foot\"><strong>Recommendation:<\u002Fstrong> Add to Cybersecurity engagement bench. Loop into compliance-review process. Consider formal cross-team rotation.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Expert cluster 2 <span class=\"ip-card-sub\">Data Eng. expertise on the Backend generalist team<\u002Fspan><\u002Fdiv>\n          <div class=\"ip-text\"><p><strong>2 engineers<\u002Fstrong> declared as Backend generalists are operating in Data Eng. contexts at a depth that exceeds 3 of the 5 declared Data Eng. specialists. Likely previous-life expertise that hasn't surfaced organisationally.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:12px\"><span style=\"display:inline-flex;align-items:center;gap:6px;background:var(--teal-l);color:var(--teal-d);border-radius:99px;padding:4px 12px;font-size:11px;font-family:var(--font);font-weight:500\"><span style=\"width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block\"><\u002Fspan>Rohan Gupta<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:6px;background:var(--teal-l);color:var(--teal-d);border-radius:99px;padding:4px 12px;font-size:11px;font-family:var(--font);font-weight:500\"><span style=\"width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block\"><\u002Fspan>Neha Sharma<\u002Fspan><\u002Fdiv>\n          <div class=\"tc-foot\"><strong>Recommendation:<\u002Fstrong> Surface to Head of Practice. Likely candidates for Data Eng. engagement leadership. Verify in 1:1.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Expert cluster 3 <span class=\"ip-card-sub\">Auth &amp; identity in QA team<\u002Fspan><\u002Fdiv>\n          <div class=\"ip-text\"><p><strong>2 engineers<\u002Fstrong> in QA show consistent, deep engagement in auth and identity domain — OAuth flow design, JWT handling, session security. Useful escalation path for auth-related questions.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:12px\"><span style=\"display:inline-flex;align-items:center;gap:6px;background:var(--teal-l);color:var(--teal-d);border-radius:99px;padding:4px 12px;font-size:11px;font-family:var(--font);font-weight:500\"><span style=\"width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block\"><\u002Fspan>Priya Iyer<\u002Fspan><span style=\"display:inline-flex;align-items:center;gap:6px;background:var(--teal-l);color:var(--teal-d);border-radius:99px;padding:4px 12px;font-size:11px;font-family:var(--font);font-weight:500\"><span style=\"width:6px;height:6px;border-radius:50%;background:var(--teal);display:inline-block\"><\u002Fspan>Sameer Joshi<\u002Fspan><\u002Fdiv>\n          <div class=\"tc-foot\"><strong>Recommendation:<\u002Fstrong> Route auth escalations here for review. Lighter-weight intervention than reorging.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Org chart vs reality gap <span class=\"ip-card-sub\">Mapped expert vs declared role<\u002Fspan><\u002Fdiv>\n          <div class=\"ip-text\">\n            <p>The org chart lists 12 domain specialists across the team. The behavioural evidence finds <strong>17 actual specialists<\u002Fstrong> — 5 of whom are operating outside their declared role.<\u002Fp>\n            <p><strong>Why this matters:<\u002Fstrong> Escalation routing today goes by org chart. That means Cybersecurity questions go to the 4 declared Cybersecurity specialists — bypassing the 3 hidden experts in Core Infra who handle the work daily. Routing follows the chart, not the work.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n              \n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n                  <div class=\"ip-text\"><p>Second Brain compares each engineer's declared role and org-chart position against their actual session behaviour over a 60-day window. An engineer is classified as a hidden expert when their session depth in a domain significantly exceeds their declared scope — evidenced by domain-relevant prompt patterns, specialised code path activity, and knowledge-retrieval behaviour consistent with subject matter expertise.<\u002Fp><p>The cohort minimum of 3 engineers must be active in the domain before hidden experts are surfaced. Engineers surfaced as hidden experts are notified only to leadership, not to the wider team.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n                  <div class=\"ip-text\"><div class=\"ai-item\"><div class=\"ai-icon \">1<\u002Fdiv><div class=\"ai-text\"><strong>Engage the 3 surfaced Cybersecurity experts in Core Infra<\u002Fstrong> — offer formal domain recognition and add them to the compliance engagement bench to reduce single-team concentration risk.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">2<\u002Fdiv><div class=\"ai-text\"><strong>Review org chart accuracy.<\u002Fstrong> Hidden expert signals consistently indicate role misalignment. A formal role review for the flagged engineers is recommended within the next quarter.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">3<\u002Fdiv><div class=\"ai-text\"><strong>Use hidden expert signals to build succession depth<\u002Fstrong> in high-risk domains (Auth &amp; Identity, API Design) before the next engagement cycle.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n        <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Total experts<\u002Fspan><span class=\"rc-row-r\">17<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Org chart says<\u002Fspan><span class=\"rc-row-r\">12<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Hidden<\u002Fspan><span class=\"rc-row-r\">7 (incl. 2 new)<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Detection window<\u002Fspan><span class=\"rc-row-r\">60 days<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-16','Command center','Domain concept mastery map')\">Domain mastery map<\u002Fli>\n            <li onclick=\"nav('view-intel-6','Command center','AI literacy &amp; skill distribution')\">AI literacy distribution<\u002Fli>\n            <li onclick=\"nav('view-domain','Intelligences','Domain &amp; knowledge')\">Domain &amp; knowledge section<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n  <!-- ══════════ INTEL #18 — AUDIT READI r\"><span class=\"bbr-lbl\">Verification rigor (8.2)<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:78%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">78<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Credential interception<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:91%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">91<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Source attribution<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:71%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">71<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Citation discipline<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:68%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">68<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Cross-checking behaviour<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:74%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">74<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Output review trails<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:62%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">62<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Decision capture<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:65%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">65<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\" style=\"opacity:0.45\"><span class=\"bbr-lbl\" style=\"color:var(--t3)\">AI risk assessment (6.1)<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:0%;background:#A1A1AA\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\" style=\"color:var(--t3)\">0<\u002Fspan><span class=\"bbr-pct\" style=\"color:var(--t3)\">no signal<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\" style=\"opacity:0.45\"><span class=\"bbr-lbl\" style=\"color:var(--t3)\">AI risk treatment (6.2)<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:0%;background:#A1A1AA\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\" style=\"color:var(--t3)\">0<\u002Fspan><span class=\"bbr-pct\" style=\"color:var(--t3)\">no signal<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\" style=\"opacity:0.45\"><span class=\"bbr-lbl\" style=\"color:var(--t3)\">Multi-model governance (9.2)<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:0%;background:#A1A1AA\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\" style=\"color:var(--t3)\">0<\u002Fspan><span class=\"bbr-pct\" style=\"color:var(--t3)\">no signal<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\" style=\"opacity:0.45\"><span class=\"bbr-lbl\" style=\"color:var(--t3)\">Third-party AI assessment (10.1)<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:0%;background:#A1A1AA\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\" style=\"color:var(--t3)\">0<\u002Fspan><span class=\"bbr-pct\" style=\"color:var(--t3)\">no signal<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\" style=\"opacity:0.45\"><span class=\"bbr-lbl\" style=\"color:var(--t3)\">Change management controls (CC8.1)<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:0%;background:#A1A1AA\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\" style=\"color:var(--t3)\">0<\u002Fspan><span class=\"bbr-pct\" style=\"color:var(--t3)\">no signal<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\" style=\"opacity:0.45\"><span class=\"bbr-lbl\" style=\"color:var(--t3)\">Third-party monitoring (CC9.2)<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:0%;background:#A1A1AA\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\" style=\"color:var(--t3)\">0<\u002Fspan><span class=\"bbr-pct\" style=\"color:var(--t3)\">no signal<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">What's blocking 100% <span class=\"ip-card-sub\">Control gaps and dependencies<\u002Fspan><\u002Fdiv>\n          <div class=\"cli\"><div class=\"chk wa\">⚠<\u002Fdiv><div><div class=\"cli-t\">Decision capture at 65 — session logging is inconsistent<\u002Fdiv><div class=\"cli-s\">Not all sessions with compliance-relevant decisions are being logged. Consistent tagging and capture discipline needed before this control can be fully evidenced.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"cli\"><div class=\"chk wa\">⚠<\u002Fdiv><div><div class=\"cli-t\">Output review trails at 62 — needs evidence persistence<\u002Fdiv><div class=\"cli-s\">Reviews happen but aren't always attached to sessions. Planned for future improvement.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"cli\"><div class=\"chk no\">!<\u002Fdiv><div><div class=\"cli-t\">6 controls returning no signal<\u002Fdiv><div class=\"cli-s\">Multi-model governance, third-party AI assessment, model lifecycle tracking, change control, incident response, AI risk register.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Audit timeline <span class=\"ip-card-sub\">Key milestones to audit-ready<\u002Fspan><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">1<\u002Fdiv><div class=\"ai-text\"><strong>Now → 30 days:<\u002Fstrong> Defend the 74/100 with on-demand evidence. All 8 active controls have verified behavioural evidence — output verification, source attribution, hallucination hygiene, and credential handling are audit-ready today.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">2<\u002Fdiv><div class=\"ai-text\"><strong>30 → 90 days:<\u002Fstrong> Expand coverage. Multi-model governance, AI risk register, and incident response telemetry are on the roadmap.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">3<\u002Fdiv><div class=\"ai-text\"><strong>Q3 onwards:<\u002Fstrong> Audit-ready composite consistently above 85. Auditors can pull evidence packs on-demand from Second Brain rather than ad-hoc collection.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      \n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n                  <div class=\"ip-text\"><p>Each of the 14 ISO 42001 / SOC 2 control framework items is scored 0–100 based on behavioural evidence captured from Second Brain sessions. Evidence types include: output verification coverage (Control 8.2), source attribution rates (Control 8.3), cross-checking behaviour (Control 8.4), hallucination hygiene (Control 8.7), session logging compliance (Control 9.1), and credential handling (Control CC6.6/CC7.2).<\u002Fp><p>The composite score is a weighted average across all active controls, with higher weight assigned to Tier 1 existential controls. Inactive controls score 0 and reduce the composite accordingly.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n                  <div class=\"ip-text\"><div class=\"ai-item\"><div class=\"ai-icon r\">!<\u002Fdiv><div class=\"ai-text\"><strong>6 controls are returning no signal<\u002Fstrong> — begin with the highest-weight items (multi-model governance, ISO 9.2) to start generating evidence and improve the composite score before Q3.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon r\">!<\u002Fdiv><div class=\"ai-text\"><strong>Credential leakage events this week require intervention.<\u002Fstrong> Pre-transmission coaching should be deployed to the weekend off-hours cohort within 7 days.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">3<\u002Fdiv><div class=\"ai-text\"><strong>Schedule an internal readiness review 6 weeks before any planned audit<\u002Fstrong> to close the gap from 74 to the 85/100 target threshold.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n        <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Current score<\u002Fspan><span class=\"rc-row-r\">74 / 100<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Threshold<\u002Fspan><span class=\"rc-row-r\">85 / 100<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Active controls<\u002Fspan><span class=\"rc-row-r\">8 of 14<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">30-day delta<\u002Fspan><span class=\"rc-row-r\">+6<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-2','Command center','Compliance-tier verification ratio')\">Compliance verification ratio<\u002Fli>\n            <li onclick=\"nav('view-intel-33','Command center','Secret &amp; credential leakage')\">Credential leakage<\u002Fli>\n            <li onclick=\"nav('view-compliance','Intelligences','Compliance &amp; risk')\">Compliance &amp; risk section<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n  <!-- ══════════ INTEL #25 — RESILIENCE ══════════ -->\n  <div id=\"view-intel-25\" class=\"pv\">\n  <div class=\"page\">\n    <di ht=\"700\">78% avg<\u002Ftext>\n          <\u002Fsvg>\n          <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:6px 16px;margin-top:14px\">\n            <span style=\"display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono)\"><span style=\"width:16px;height:2px;background:#18181B;display:inline-block\"><\u002Fspan>Core Infra ↑<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono)\"><span style=\"width:16px;height:2px;background:#3B82F6;display:inline-block\"><\u002Fspan>Platform ↑<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono)\"><span style=\"width:16px;height:2px;background:#10B981;display:inline-block\"><\u002Fspan>QA ↑<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono)\"><span style=\"width:16px;height:2px;background:#8B5CF6;display:inline-block\"><\u002Fspan>Data →<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono)\"><span style=\"width:16px;height:2px;background:#F97316;display:inline-block\"><\u002Fspan>Frontend →<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono)\"><span style=\"width:16px;height:2px;background:#06B6D4;display:inline-block\"><\u002Fspan>Product ↑<\u002Fspan><span style=\"display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono)\"><span style=\"width:16px;height:2px;background:#EF4444;display:inline-block\"><\u002Fspan>Design ↓<\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono)\"><span style=\"width:16px;height:2px;background:#71717A;display:inline-block;border-top:2px dashed #71717A\"><\u002Fspan>Org avg<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Staffing implications<\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">1<\u002Fdiv><div class=\"ai-text\"><strong>Algorithm design is the team's strongest muscle.<\u002Fstrong> 86% convergence on novel algorithm work. Staff aggressively on competitive-differentiator problems.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">2<\u002Fdiv><div class=\"ai-text\"><strong>Integration / API at 64% is the soft spot.<\u002Fstrong> Lower convergence suggests integration-specific cognitive load (third-party docs, format mismatches, edge cases). Worth investigating whether more upfront context loading helps.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">3<\u002Fdiv><div class=\"ai-text\"><strong>The 8% abandonment is healthy.<\u002Fstrong> Teams that never abandon are sunk-cost prisoners. The 8% rate reflects healthy problem re-framing behaviour.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      \n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n                  <div class=\"ip-text\"><p>Late-iteration convergence measures whether engineers reach a stable, high-quality verified output within a bounded number of session turns. The convergence rate = sessions where a verified output was reached in ≤4 iterations ÷ total completed sessions, expressed as a percentage.<\u002Fp><p>Sessions exceeding 8 iterations without a verified output are flagged as inefficient loops and excluded from the convergence numerator. The industry benchmark range is 60–70%; the org's current 78% indicates strong prompt discipline and efficient workflow patterns.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n                  <div class=\"ip-text\"><div class=\"ai-item\"><div class=\"ai-icon \">1<\u002Fdiv><div class=\"ai-text\"><strong>High convergence correlates with strong prompt design skills.<\u002Fstrong> Identify the top-converging engineers as peer coaches for the Developing band — their workflows are the fastest path to mandate adoption.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">2<\u002Fdiv><div class=\"ai-text\"><strong>Monitor the metric quarterly.<\u002Fstrong> A declining trend may indicate increasing task complexity rather than skill regression — review alongside session depth scores to distinguish the two.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">3<\u002Fdiv><div class=\"ai-text\"><strong>Use convergence rate in the AI-First mandate compliance narrative<\u002Fstrong> — 78% vs 60–70% industry benchmark is strong evidence of mature AI workflow discipline across the org.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n        <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Convergence<\u002Fspan><span class=\"rc-row-r\">78%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Plateau<\u002Fspan><span class=\"rc-row-r\">14%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Abandon<\u002Fspan><span class=\"rc-row-r\">8%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Industry avg<\u002Fspan><span class=\"rc-row-r\">60–70%<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Sample<\u002Fspan><span class=\"rc-row-r\">412 sessions<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-4','Command center','Stuck-person early warning')\">Stuck-person warning<\u002Fli>\n            <li onclick=\"nav('view-intel-6','Comma
