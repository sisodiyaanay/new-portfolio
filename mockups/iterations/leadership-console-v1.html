<\u002Ftd><td class=\"mono\">14:44<\u002Ftd><td class=\"bold\">JWT token<\u002Ftd><td><span class=\"b ba\" style=\"font-size:10px\">Warned · ack'd<\u002Fspan><\u002Ftd><td>Anonymous · cohort signal<\u002Ftd><\u002Ftr>\n              <tr><td class=\"mono\" style=\"color:var(--t3)\">Tue 12<\u002Ftd><td class=\"mono\">19:02<\u002Ftd><td class=\"bold\">API key (AWS)<\u002Ftd><td><span class=\"b br\" style=\"font-size:10px\">Intercepted · rotated<\u002Fspan><\u002Ftd><td>Anonymous · cohort signal<\u002Ftd><\u002Ftr>\n              <tr><td class=\"mono\" style=\"color:var(--t3)\">Mon 11<\u002Ftd><td class=\"mono\">10:33<\u002Ftd><td class=\"bold\">DB conn string<\u002Ftd><td><span class=\"b br\" style=\"font-size:10px\">Blocked · logged<\u002Fspan><\u002Ftd><td>Anonymous · cohort signal<\u002Ftd><\u002Ftr>\n              <tr><td class=\"mono\" style=\"color:var(--t3)\">Mon 11<\u002Ftd><td class=\"mono\">16:18<\u002Ftd><td class=\"bold\">API key (GCP)<\u002Ftd><td><span class=\"b br\" style=\"font-size:10px\">Intercepted · rotated<\u002Fspan><\u002Ftd><td>Anonymous · cohort signal<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n          <div class=\"ip-text\">\n            <p>Second Brain monitors every session for credential-pattern signals: API key formats, JWT structures, database connection strings, private key headers, and similar sensitive token patterns. Detection runs pre-transmission — the pattern is identified before it leaves the local context. All events are logged with a timestamp, pattern type, and intercept status.<\u002Fp>\n            <p>Leakage density = credential events ÷ total sessions in the rolling 7-day window. Events are classified by severity: critical (active credentials), warning (expired or redacted), info (format-matched but verified safe). The daily alerting threshold is configurable per organisation.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon r\">!<\u002Fdiv><div class=\"ai-text\"><strong>API keys are the dominant class (48%).<\u002Fstrong> Worth investing in better local credential management — consider rolling out a per-developer secrets manager and tying it to the team mandate.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">2<\u002Fdiv><div class=\"ai-text\"><strong>Weekend uptick is structural.<\u002Fstrong> Off-hours work has different workflow patterns. Pre-emptive coaching on credential hygiene before sprint pushes.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">3<\u002Fdiv><div class=\"ai-text\"><strong>Current intercept-and-warn policy is right for now.<\u002Fstrong> Hard-block mode is the escalation option if events trend up. Not needed yet — events are declining week-over-week.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">This week<\u002Fspan><span class=\"rc-row-r\">3 events<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">7 days<\u002Fspan><span class=\"rc-row-r\">19 events<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">30 days<\u002Fspan><span class=\"rc-row-r\">71 events<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Policy<\u002Fspan><span class=\"rc-row-r\">Intercept+warn<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Auto-rotation<\u002Fspan><span class=\"rc-row-r\">Active<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-18','Command center','ISO 42001 / SOC 2 audit readiness')\">Audit readiness<\u002Fli>\n            <li onclick=\"nav('view-intel-2','Command center','Compliance-tier verification ratio')\">Compliance ratio<\u002Fli>\n            <li onclick=\"nav('view-compliance','Intelligences','Compliance &amp; risk')\">Compliance &amp; risk section<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n  <!-- ══════════ INTEL T6 — CULTURE INDEX ══════════ -->\n  <div id=\"view-intel-t6\" class=\"pv\">\n  <div class=\"page\">\n    <div class=\"ip-header\">\n      <div>\n        <h1 class=\"ip-title\">AI-Native engineering culture index<\u002Fh1>\n        <div class=\"ip-badges\"><span class=\"b ba\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot dim\"><\u002Fdiv><\u002Fdiv>Building<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      \n    <\u002Fdiv>\n    <p class=\"ip-desc\">Whether the company can ship AI features at market pace. Composite of literacy, agentic adoption, context engineering, verification hygiene, and team-level signals. The single number the CEO uses to talk about engineering capability with the board.<\u002Fp>\n    <div class=\"ip-hero\">\n      <div class=\"ip-hero-l\">\n        <div class=\"ip-hero-val\">62<span class=\"ip-hero-unit\">/ 100<\u002Fspan><\u002Fdiv>\n        <div class=\"ip-hero-tag ba\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot dim\"><\u002Fdiv><\u002Fdiv>Building · above sector median<\u002Fdiv>\n        <div class=\"ip-hero-note\">Sector median for AI-mandated engineering orgs: 54/100. Above-bench but not yet AI-Native composite (75+).<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ip-hero-r\">\n        <span class=\"ip-hero-rlbl\">30-day trend<\u002Fspan><span class=\"ip-hero-trend\">↑ +4 points<\u002Fspan>\n        <span class=\"ip-hero-rlbl\" style=\"margin-top:6px\">90-day projection<\u002Fspan><span class=\"ip-hero-trend\" style=\"color:var(--t2)\">72/100<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ip-layout\">\n      <div class=\"ip-main\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">8-dimension breakdown<\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">AI literacy<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:71%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">71<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Agentic adoption<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:48%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">48<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Context engineering<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:57%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">57<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Verification hygiene<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:78%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">78<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Mandate adoption<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:67%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">67<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Decision capture<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:65%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">65<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Resilience patterns<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:78%;background:#18181B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">78<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Knowledge governance<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:42%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">42<\u002Fspan><span class=\"bbr-pct\">/100<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n                <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">90-day forecast <span class=\"ip-card-sub\">Actuals M-2 to now · projection M+1 to M+3<\u002Fspan><\u002Fdiv>\n          <svg viewBox=\"0 0 520 160\" style=\"display:block;width:100%;height:160px;overflow:visible\">\n            <!-- grid lines -->\n            <g stroke=\"#E4E4E7\" stroke-width=\"1\">\n              <line x1=\"36\" y1=\"25\" x2=\"500\" y2=\"25\"><\u002Fline>\n              <line x1=\"36\" y1=\"58\" x2=\"500\" y2=\"58\"><\u002Fline>\n              <line x1=\"36\" y1=\"91\" x2=\"500\" y2=\"91\"><\u002Fline>\n              <line x1=\"36\" y1=\"124\" x2=\"500\" y2=\"124\"><\u002Fline>\n            <\u002Fg>\n            <!-- y labels -->\n            <g font-family=\"Geist Mono,monospace\" font-size=\"9\" fill=\"#A1A1AA\" text-anchor=\"end\">\n              <text x=\"32\" y=\"29\">80<\u002Ftext>\n              <text x=\"32\" y=\"62\">72<\u002Ftext>\n              <text x=\"32\" y=\"95\">64<\u002Ftext>\n              <text x=\"32\" y=\"128\">56<\u002Ftext>\n            <\u002Fg>\n            <!-- TQ reference line at 75 = y=44 -->\n            <line x1=\"36\" y1=\"44\" x2=\"500\" y2=\"44\" stroke=\"#A1A1AA\" stroke-width=\"1\" stroke-dasharray=\"3 4\"><\u002Fline>\n            <text x=\"504\" y=\"47\" font-family=\"Geist Mono,monospace\" font-size=\"9\" fill=\"#71717A\" font-weight=\"500\">TQ 75<\u002Ftext>\n            <!-- x labels -->\n            <g font-family=\"Geist Mono,monospace\" font-size=\"9\" fill=\"#A1A1AA\" text-anchor=\"middle\">\n              <text x=\"50\" y=\"155\">M-2<\u002Ftext>\n              <text x=\"140\" y=\"155\">M-1<\u002Ftext>\n              <text x=\"230\" y=\"155\">Now<\u002Ftext>\n              <text x=\"320\" y=\"155\">M+1<\u002Ftext>\n              <text x=\"410\" y=\"155\">M+2<\u002Ftext>\n              <text x=\"470\" y=\"155\">M+3<\u002Ftext>\n            <\u002Fg>\n            <!-- projected area fill -->\n            <path d=\"M 230,104 L 320,87 L 410,73 L 470,60 L 470,135 L 230,135 Z\" fill=\"#18181B\" fill-opacity=\"0.05\"><\u002Fpath>\n            <!-- actual line -->\n            <path d=\"M 50,122 L 140,113 L 230,104\" fill=\"none\" stroke=\"#18181B\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n            <!-- projected line (dashed) -->\n            <path d=\"M 230,104 L 320,87 L 410,73 L 470,60\" fill=\"none\" stroke=\"#18181B\" stroke-width=\"2\" stroke-dasharray=\"5 4\" stroke-linecap=\"round\" opacity=\"0.6\"><\u002Fpath>\n            <!-- past points -->\n            <circle cx=\"50\" cy=\"122\" r=\"3\" fill=\"#18181B\" opacity=\"0.5\"><\u002Fcircle>\n            <circle cx=\"140\" cy=\"113\" r=\"3\" fill=\"#18181B\" opacity=\"0.5\"><\u002Fcircle>\n            <!-- now marker -->\n            <circle cx=\"230\" cy=\"104\" r=\"6\" fill=\"#18181B\" stroke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n            <circle cx=\"230\" cy=\"104\" r=\"10\" fill=\"#18181B\" fill-opacity=\"0.15\"><\u002Fcircle>\n            <text x=\"238\" y=\"96\" font-family=\"Geist Mono,monospace\" font-size=\"10\" fill=\"#18181B\" font-weight=\"700\">62 · today<\u002Ftext>\n            <!-- M+4 cross note -->\n            <text x=\"470\" y=\"52\" font-family=\"Geist,system-ui\" font-size=\"9\" fill=\"#18181B\" text-anchor=\"end\" font-weight=\"500\">crosses TQ ≈ M+4<\u002Ftext>\n          <\u002Fsvg>\n          <div class=\"tc-foot\">Projection assumes current investment continues. Trajectory crosses top quartile bar (75) at month +4.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Priority gaps to close<\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon a\">1<\u002Fdiv><div class=\"ai-text\"><strong>Agentic adoption (48/100).<\u002Fstrong> The team uses Claude as a chat partner more than as an agent. Tooling investment + 2 weeks of agentic-pattern coaching closes this.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon a\">2<\u002Fdiv><div class=\"ai-text\"><strong>Knowledge governance (42/100).<\u002Fstrong> Decision capture is improving but knowledge graph and cross-team learning loops are weak. These are on the roadmap for future improvement.<\u002Fdiv><\u002Fdiv>\n          <div class=\"ai-item\"><div class=\"ai-icon\">3<\u002Fdiv><div class=\"ai-text\"><strong>Context engineering (57/100).<\u002Fstrong> Most engineers under-context their sessions. Prompt-library standardisation lifts this without new infra.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      \n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n                  <div class=\"ip-text\"><p>The AI-Native culture index is a composite of <strong>8 behavioural dimensions<\u002Fstrong>, each scored 0–100 from session signals, averaged to produce a 0–100 composite: <strong>AI literacy<\u002Fstrong> (foundational fluency with AI tools and concepts), <strong>Agentic adoption<\u002Fstrong> (multi-step autonomous task patterns), <strong>Context engineering<\u002Fstrong> (quality of session framing and context loading), <strong>Verification hygiene<\u002Fstrong> (consistent output checking behaviour), <strong>Mandate adoption<\u002Fstrong> (depth of AI-First mandate compliance), <strong>Decision capture<\u002Fstrong> (logging of AI-informed decisions), <strong>Resilience patterns<\u002Fstrong> (convergence on hard tasks rather than abandonment), and <strong>Knowledge governance<\u002Fstrong> (cross-team sharing and prompt library use).<\u002Fp><p>The sector median of 54 is derived from anonymised benchmark data across comparable engineering organisations. Scores above 60 indicate an AI-native culture in development.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n                  <div class=\"ip-text\"><div class=\"ai-item\"><div class=\"ai-icon r\">!<\u002Fdiv><div class=\"ai-text\"><strong>Agentic adoption is the weakest dimension at 48/100.<\u002Fstrong> Prioritise agentic workflow workshops for the bottom two-thirds of the org before Q3 — this is the highest-leverage culture lever.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">2<\u002Fdiv><div class=\"ai-text\"><strong>Verification culture is a structural strength.<\u002Fstrong> Use it as the foundation for the ISO 42001 control evidence narrative and the board-level AI governance story.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">3<\u002Fdiv><div class=\"ai-text\"><strong>Set a 62→70 culture index target for Q3<\u002Fstrong> with monthly tracking across all 25 dimensions. Agentic adoption and cross-team sharing are the fastest-moving levers.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n        <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Composite<\u002Fspan><span class=\"rc-row-r\">62 / 100<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Sector median<\u002Fspan><span class=\"rc-row-r\">54<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Top quartile<\u002Fspan><span class=\"rc-row-r\">75<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">AI-Native bar<\u002Fspan><span class=\"rc-row-r\">85<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">90-day forecast<\u002Fspan><span class=\"rc-row-r\">72<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-6','Command center','AI literacy &amp; skill distribution')\">AI literacy distribution<\u002Fli>\n            <li onclick=\"nav('view-intel-7','Command center','AI-First mandate compliance')\">Mandate compliance<\u002Fli>\n            <li onclick=\"nav('view-intel-pvs','Command center','Second Brain product-value story')\">Product-value story<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n  <!-- ══════════ INTEL T6b — PRODUCT VALUE STORY ══════════ -->\n  <div id=\"view-intel-pvs\" class=\"pv\">\n  <div class=\"page\">\n    <div class=\"ip-header\">\n      <div>\n        <h1 class=\"ip-title\">Second Brain product-value story<\u002Fh1>\n        <div class=\"ip-badges\"><span class=\"b bt\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><\u002Fdiv>Live<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      \n    <\u002Fdiv>\n    <p class=\"ip-desc\">The ROI narrative the product tells about itself. Hours of engineering time preserved, risk events caught, rework prevented. The board-level story that justifies the investment.<\u002Fp>\n    <div class=\"ip-hero\">\n      <div class=\"ip-hero-l\">\n        <div class=\"ip-hero-val\">3,200<span class=\"ip-hero-unit\">hrs preserved<\u002Fspan><\u002Fdiv>\n        <div class=\"ip-hero-tag bt\"><div class=\"bdots\"><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><div class=\"dot\"><\u002Fdiv><\u002Fdiv>This quarter · ~$640k internal value<\u002Fdiv>\n        <div class=\"ip-hero-note\">Hours preserved = time saved through prevented rework + faster convergence on hard problems. Internal rate: $200/hour engineering.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ip-hero-r\">\n        <span class=\"ip-hero-rlbl\">Quarter-on-quarter<\u002Fspan><span class=\"ip-hero-trend\">↑ +18%<\u002Fspan>\n        <span class=\"ip-hero-rlbl\" style=\"margin-top:6px\">Annualised value<\u002Fspan><span class=\"ip-hero-trend\" style=\"color:var(--t2)\">~$2.6M<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ip-layout\">\n      <div class=\"ip-main\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Value composition <span class=\"ip-card-sub\">3,200 hours · this quarter<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Prevented rework<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:42%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">1,344 hrs<\u002Fspan><span class=\"bbr-pct\">42%<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Faster convergence<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:31%;background:#52525B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">992 hrs<\u002Fspan><span class=\"bbr-pct\">31%<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Reduced stuck loops<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:11%;background:#71717A\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">352 hrs<\u002Fspan><span class=\"bbr-pct\">11%<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Knowledge reuse<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:7%;background:#A1A1AA\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">224 hrs<\u002Fspan><span class=\"bbr-pct\">7%<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Onboarding accel.<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:9%;background:#A1A1AA\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">288 hrs<\u002Fspan><span class=\"bbr-pct\">9%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Risk events caught <span class=\"ip-card-sub\">Estimated impact prevented<\u002Fspan><\u002Fdiv>\n          <table class=\"btbl\">\n            <thead><tr><th>Event class<\u002Fth><th>Count<\u002Fth><th>Severity<\u002Fth><th style=\"text-align:right\">Est. impact<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr><td class=\"bold\">Credential leaks intercepted<\u002Ftd><td class=\"mono\">71<\u002Ftd><td><span class=\"b br\" style=\"font-size:10px\">High<\u002Fspan><\u002Ftd><td class=\"mono\" style=\"text-align:right\">~$1.2M risk<\u002Ftd><\u002Ftr>\n              <tr><td class=\"bold\">Compliance verification gaps<\u002Ftd><td class=\"mono\">23<\u002Ftd><td><span class=\"b ba\" style=\"font-size:10px\">Medium<\u002Fspan><\u002Ftd><td class=\"mono\" style=\"text-align:right\">~$420k risk<\u002Ftd><\u002Ftr>\n              \n              <tr><td class=\"bold\">Hidden expertise activated<\u002Ftd><td class=\"mono\">7<\u002Ftd><td><span class=\"b bt\" style=\"font-size:10px\">Strategic<\u002Fspan><\u002Ftd><td class=\"mono\" style=\"text-align:right\">unquantified<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n                <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Knowledge events <span class=\"ip-card-sub\">Compounding value<\u002Fspan><\u002Fdiv>\n          \n          \n          <div class=\"bbr\"><span class=\"bbr-lbl\">Prompts in library<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:60%;background:#3F3F46\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">18<\u002Fspan><span class=\"bbr-pct\">org-shared<\u002Fspan><\u002Fdiv>\n          <div class=\"bbr\"><span class=\"bbr-lbl\">Hidden experts surfaced<\u002Fspan><div class=\"bbr-trk\"><div class=\"bbr-fil\" style=\"width:25%;background:#52525B\"><\u002Fdiv><\u002Fdiv><span class=\"bbr-val\">7<\u002Fspan><span class=\"bbr-pct\">routable<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n              \n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">How it's computed<\u002Fdiv>\n                  <div class=\"ip-text\"><p>Second Brain aggregates three measurable value signals from session data across a rolling 90-day window: <strong>Hours preserved<\u002Fstrong> (sessions where Second Brain demonstrably replaced a manual research, drafting, or review task — estimated at 45 min/session on average), <strong>Risk events intercepted<\u002Fstrong> (credential leakage, compliance breach patterns, and policy violations caught pre-transmission), and <strong>Decisions informed<\u002Fstrong> (sessions linked to documented strategic decision records).<\u002Fp><p>Annualised value is extrapolated from the 90-day rolling window. Internal value uses a blended hourly rate of £200/hr. Annualised figure uses a 4× multiplier on the 90-day baseline.<\u002Fp><\u002Fdiv>\n                <\u002Fdiv>\n        <div class=\"ip-card\">\n                  <div class=\"ip-card-ti\">Recommended actions<\u002Fdiv>\n                  <div class=\"ip-text\"><div class=\"ai-item\"><div class=\"ai-icon \">1<\u002Fdiv><div class=\"ai-text\"><strong>The product-value story is strong but under-communicated.<\u002Fstrong> Use the 3,200 hours preserved figure and $640k internal value in the next leadership review and investor narrative.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">2<\u002Fdiv><div class=\"ai-text\"><strong>Track risk interception rate as a board-level KPI<\u002Fstrong> alongside the financial value metric — it is the most defensible evidence of Second Brain's compliance contribution.<\u002Fdiv><\u002Fdiv><div class=\"ai-item\"><div class=\"ai-icon \">3<\u002Fdiv><div class=\"ai-text\"><strong>Begin collecting decision-attribution data systematically<\u002Fstrong> to strengthen the decisions-informed dimension of the value story for the next quarterly business review.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n        <\u002Fdiv>\n      <div class=\"ip-rail\">\n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Quick stats<\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Hours preserved<\u002Fspan><span class=\"rc-row-r\">3,200<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Internal value<\u002Fspan><span class=\"rc-row-r\">~$640k<\u002Fspan><\u002Fdiv>\n          <div class=\"rc-row\"><span class=\"rc-row-l\">Risk prevented<\u002Fspan><span class=\"rc-row-r\">~$1.6M<\u002Fspan><\u002Fdiv>\n          \n          \n          <div class=\"rc-row\"><span class=\"rc-row-l\">Annualised<\u002Fspan><span class=\"rc-row-r\">~$2.6M<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        \n    \n        <div class=\"ip-card\">\n          <div class=\"ip-card-ti\">Related intelligences<\u002Fdiv>\n          <ul class=\"rc-list\">\n            <li onclick=\"nav('view-intel-t6','Command center','AI-Native engineering culture index')\">Culture index<\u002Fli>\n            \n            <li onclick=\"nav('view-culture','Intelligences','Culture &amp; strategy')\">Culture &amp; strategy section<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n\n  <\u002Fdiv>\n<!-- /shell -->\n\n\n\n<div id=\"toast\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><span id=\"toast-msg\">Report exported<\u002Fspan><\u002Fdiv>\n\n<script>\n/* ─── PARENT VIEW MAP (A1 / A2) ─── */\nconst parentViewMap={\n  'Leadership':'view-command','Command center':'view-command',\n  'Intelligences':'view-command','Compliance & risk':'view-compliance',\n  'People & capability':'view-people','Domain & knowledge':'view-domain',\n  'Culture & strategy':'view-culture'\n};\nconst parentMeta={\n  'view-command':['Leadership','Command center'],\n  'view-compliance':['Intelligences','Compliance & risk'],\n  'view-people':['Intelligences','People & capability'],\n  'view-domain':['Intelligences','Domain & knowledge'],\n  'view-culture':['Intelligences','Culture & strategy']\n};\n\nfunction toggleSidebar(){\n  document.querySelector('.sb').classList.toggle('collapsed');\n}\n\nfunction nav(viewId,parent,current){\n  document.querySelectorAll('.pv').forEach(v=>v.classList.remove('active'));\n  document.querySelectorAll('.sbi').forEach(s=>s.classList.remove('on'));\n  const view=document.getElementById(viewId);\n  if(view)view.classList.add('active');\n  // A2: for intel pages highlight parent section sidebar item\n  const targetSb=document.querySelector('[data-view=\"'+viewId+'\"]');\n  if(targetSb){targetSb.classList.add('on');}\n  else{\n    const parentViewId=parentViewMap[parent]||'view-command';\n    const parentSb=document.querySelector('[data-view=\"'+parentViewId+'\"]');\n    if(parentSb)parentSb.classList.add('on');\n  }\n  // Breadcrumb: parent shown only on intel detail pages\n  const isIntel=viewId.startsWith('view-intel');\n  const bcP=document.getElementById('bc-p');\n  const bcS=document.querySelector('.bc-s');\n  if(isIntel){\n    bcP.textContent=parent;\n    bcP.style.display='';\n    if(bcS)bcS.style.display='';\n    const parentViewId=parentViewMap[parent]||'view-command';\n    bcP.onclick=()=>{\n      const[pp,pc]=parentMeta[parentViewId]||['Leadership','Command center'];\n      nav(parentViewId,pp,pc);\n    };\n  } else {\n    bcP.style.display='none';\n    if(bcS)bcS.style.display='none';\n    bcP.onclick=null;\n  }\n  document.getElementById('bc-c').textContent=current;\n  const viewsEl=document.querySelector('.views');\n  if(viewsEl)viewsEl.scrollTop=0;\n  if(view)view.scrollTop=0;\n}\n\n\nfunction toggleView(btn){\n  btn.classList.toggle('on');\n  showToast(btn.classList.contains('on')?'7-day view enabled':'Daily view');\n}\nfunction showToast(msg){\n  const t=document.getElementById('toast');\n  document.getElementById('toast-msg').textContent=msg;\n  t.classList.add('show');\n  setTimeout(()=>t.classList.remove('show'),2200);\n}\n\n/* ─── G2: PERIOD SEGMENT CONTROL ─── */\nfunction setPeriod(btn,period){\n  [...btn.parentNode.querySelectorAll('button')].forEach(b=>b.classList.remove('on'));\n  btn.classList.add('on');\n  const label={'7d':'7-day','30d':'30-day','90d':'90-day'}[period]||period;\n  showToast('Showing '+label+' view');\n}\n\n/* ─── E1: WEEK SELECTOR DROPDOWN ─── */\nfunction toggleWeekDrop(){\n  const d=document.getElementById('week-sel-drop');\n  d.style.display=d.style.display==='none'?'block':'none';\n}\nfunction selectWeek(el,label){\n  document.querySelectorAll('.week-sel-opt').forEach(o=>o.classList.remove('on'));\n  el.classList.add('on');\n  document.getElementById('week-sel-label').textContent=label;\n  document.getElementById('week-sel-drop').style.display='none';\n  showToast('Week changed to '+label);\n}\ndocument.addEventListener('click',e=>{\n  const wrap=document.getElementById('week-sel-wrap');\n  if(wrap&&!wrap.contains(e.target))document.getElementById('week-sel-drop').style.display='none';\n  const fd=document.getElementById('reg-filter-drop');\n  const fb=document.getElementById('reg-filter-btn');\n  if(fd&&fb&&!fd.contains(e.target)&&!fb.contains(e.target))fd.style.display='none';\n});\n\n/* ─── REGISTRY: B1/B2/B3/F1 — FILTER + SEARCH + PAGINATION ─── */\nlet regPage=1;\nconst regPerPage=10;\n\n\n\n\n\n\n\n\n\n\nfunction setConvPeriod(btn, period){\n  document.querySelectorAll('.conv-chart').forEach(c=>c.style.display='none');\n  document.getElementById('convChart'+period).style.display='block';\n  btn.parentNode.querySelectorAll('button').forEach(b=>{\n    b.style.background='#fff'; b.style.color='var(--t3)'; b.style.fontWeight='400';\n  });\n  btn.style.background='var(--teal-l)'; btn.style.color='var(--teal-d)'; btn.style.fontWeight='700';\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"</script>
