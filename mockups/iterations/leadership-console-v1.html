  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  --amber-d:#B45309;\n  --amber-b:#FDE68A;\n\n  /* Typography — shadcn Geist */\n  --font:'Geist','Geist Fallback',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;\n  --mono:'Geist Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;\n\n  --r:6px;\n  --rl:10px;\n  --shadow-sm:0 1px 2px rgba(0,0,0,.05);\n  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);\n  --shadow-md:0 4px 6px rgba(0,0,0,.05),0 2px 4px rgba(0,0,0,.04);\n  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);\n}\nhtml,body{font-family:var(--font);font-size:13px;color:var(--t1);-webkit-font-smoothing:antialiased;background:var(--bg)}\n@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}\n@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.7)}}\n@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n@keyframes tout{from{opacity:1}to{opacity:0;transform:translateY(-4px)}}\n.hidden{display:none!important}\n\n/* ════════════════════════════════════════════════════════════\n   COMMAND CENTER — SHADCN-ALIGNED REDESIGN (scoped to .cc-redesign)\n   Information patterns inspired by ref dashboard.\n   Visual aesthetic: neutral zinc palette + teal accent, Geist only.\n   ════════════════════════════════════════════════════════════ */\n.cc-redesign{font-family:var(--font);font-size:14px;line-height:1.55;color:var(--t1);max-width:1280px;padding:0 32px 80px;letter-spacing:-.005em}\n.cc-redesign *{box-sizing:border-box}\n\n/* ── Hero ── */\n.cc-redesign .hero{padding:32px 0 12px}\n.cc-redesign .hero-meta{color:var(--t3);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;font-weight:500;font-family:var(--mono)}\n.cc-redesign .hero-title{font-family:var(--font);font-weight:500;font-size:26px;line-height:1.4;letter-spacing:-.02em;max-width:940px;color:var(--t2)}\n.cc-redesign .hero-title em{font-style:normal;color:var(--t1);font-weight:600}\n.cc-redesign .hero-title .hi{background:var(--amber-l);color:var(--t1);font-weight:600;padding:1px 5px;border-radius:3px;box-decoration-break:clone;-webkit-box-decoration-break:clone}\n.cc-redesign .scope-bar{display:flex;gap:6px;margin-top:26px;flex-wrap:wrap;align-items:center}\n.cc-redesign .scope-lbl{color:var(--t3);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;font-family:var(--mono);margin-right:4px}\n.cc-redesign .scope-pill{display:inline-flex;align-items:center;height:30px;padding:0 12px;border:1px solid var(--border);border-radius:6px;background:var(--surface);font-size:12px;color:var(--t2);cursor:pointer;transition:all .12s;font-family:inherit;font-weight:500}\n.cc-redesign .scope-pill:hover{background:var(--surface2);color:var(--t1);border-color:var(--border2)}\n.cc-redesign .scope-pill.on{background:var(--t1);color:#fff;border-color:var(--t1)}\n.cc-redesign .seg{display:inline-flex;background:var(--surface2);border-radius:7px;padding:3px;border:1px solid var(--border)}\n.cc-redesign .seg button{background:transparent;border:0;padding:5px 12px;border-radius:5px;font-size:12px;color:var(--t2);cursor:pointer;font-family:inherit;font-weight:500}\n.cc-redesign .seg button.on{background:var(--surface);color:var(--t1);box-shadow:0 1px 2px rgba(0,0,0,.06)}\n.cc-redesign .coverage-strip{font-size:11px;color:var(--t3);margin-top:16px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;display:inline-block;line-height:1.5;font-family:var(--mono)}\n.cc-redesign .coverage-strip strong{color:var(--t1);font-weight:500}\n\n/* ── Sections ── */\n.cc-redesign .cc-section{padding:24px 0}\n.cc-redesign .section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px;gap:24px;flex-wrap:wrap}\n.cc-redesign .section-head h2{font-family:var(--font);font-weight:600;font-size:18px;letter-spacing:-.015em;color:var(--t1);line-height:1.3}\n.cc-redesign .section-head .lede{color:var(--t3);font-size:13px;max-width:620px;margin-top:4px;line-height:1.55}\n\n/* ── Cards / grids (shadcn card pattern) ── */\n.cc-redesign .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px}\n.cc-redesign .grid{display:grid;gap:16px}\n.cc-redesign .grid-2{grid-template-columns:1fr 1fr}\n.cc-redesign .grid-3{grid-template-columns:repeat(3,1fr)}\n.cc-redesign .grid-4{grid-template-columns:repeat(4,1fr)}\n.cc-redesign .grid-12{grid-template-columns:1.4fr 1fr}\n\n/* ── KPI cards ── */\n.cc-redesign .kpi{padding:22px 24px;cursor:pointer;transition:all .15s;background:var(--surface);border:1px solid var(--border);border-radius:12px}\n.cc-redesign .kpi:hover{border-color:var(--ink-4);box-shadow:var(--shadow-sm)}\n.cc-redesign .kpi .num{font-family:var(--font);font-size:30px;font-weight:600;letter-spacing:-.025em;color:var(--t1);line-height:1.05;font-variant-numeric:tabular-nums}\n.cc-redesign .kpi .num small{font-size:14px;color:var(--t3);font-weight:400;margin-left:1px}\n.cc-redesign .kpi .name{color:var(--t2);font-size:13px;margin-top:6px;font-weight:500}\n.cc-redesign .kpi .ctx{font-size:12px;color:var(--t3);margin-top:14px;line-height:1.6;padding-top:14px;border-top:1px solid var(--border)}\n.cc-redesign .kpi .ctx strong{color:var(--t1);font-weight:500}\n.cc-redesign .delta-up{color:var(--green-d);font-weight:500}\n.cc-redesign .delta-down{color:var(--red-d);font-weight:500}\n.cc-redesign .delta-flat{color:var(--t3)}\n\n/* ── Decision cards (bordered-left, shadcn alert-inspired) ── */\n.cc-redesign .decision-card{padding:20px 22px;cursor:pointer;transition:all .15s;background:var(--surface);border:1px solid var(--border);border-left-width:3px;border-radius:10px;display:flex;flex-direction:column}\n.cc-redesign .decision-card:hover{border-color:var(--ink-4);box-shadow:var(--shadow-sm)}\n.cc-redesign .decision-card.amber{border-left-color:var(--amber)}\n.cc-redesign .decision-card.amber:hover{border-color:var(--ink-4);border-left-color:var(--amber)}\n.cc-redesign .decision-card.red{border-left-color:var(--red)}\n.cc-redesign .decision-card.red:hover{border-color:var(--ink-4);border-left-color:var(--red)}\n.cc-redesign .decision-card.teal{border-left-color:var(--teal)}\n.cc-redesign .decision-card.teal:hover{border-color:var(--ink-4);border-left-color:var(--teal)}\n.cc-redesign .decision-card .dc-tag{font-family:var(--mono);font-size:10.5px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;font-weight:500;margin-bottom:8px}\n.cc-redesign .decision-card .dc-tit{font-family:var(--font);font-size:15.5px;font-weight:600;line-height:1.4;color:var(--t1);margin-bottom:10px;letter-spacing:-.005em}\n.cc-redesign .decision-card .ctx{font-size:12.5px;color:var(--t2);line-height:1.6;flex:1}\n.cc-redesign .decision-card .ctx strong{color:var(--t1);font-weight:600}\n.cc-redesign .decision-card .dc-cta{font-size:12.5px;color:var(--t1);margin-top:14px;padding-top:12px;border-top:1px solid var(--border);font-weight:500;display:inline-flex;align-items:center;gap:4px}\n\n/* ── Adoption / spark rows ── */\n.cc-redesign .spark-row{display:grid;grid-template-columns:140px 1fr 80px 60px;gap:14px;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;border-radius:6px}\n.cc-redesign .spark-row:hover{background:var(--surface2);margin:0 -10px;padding-left:10px;padding-right:10px}\n.cc-redesign .spark-row:last-child{border-bottom:0}\n.cc-redesign .spark-row .team{font-size:13px;color:var(--t1);font-weight:500}\n.cc-redesign .spark-row .pct{font-family:var(--font);font-size:16px;font-weight:600;text-align:right;color:var(--t1);font-variant-numeric:tabular-nums;letter-spacing:-.015em}\n.cc-redesign .spark-row .pct small{font-size:11px;color:var(--t3);font-weight:400;margin-left:1px;letter-spacing:0}\n.cc-redesign .spark-row .delta{font-size:11.5px;text-align:right;font-weight:500;font-variant-numeric:tabular-nums}\n.cc-redesign .bar- kground:#E4E4E7}\n.cc-redesign .lg-swatch.seg-l3{background:#D4D4D8}\n.cc-redesign .lg-swatch.seg-l4{background:#A1A1AA}\n.cc-redesign .lg-swatch.seg-l5{background:#52525B}\n.cc-redesign .lg-swatch.seg-l6{background:#18181B}\n\n/* ── Heatmap (single-hue: zinc to red gap scale) ── */\n.cc-redesign .heat{display:grid;grid-template-columns:160px repeat(7,1fr);gap:5px;margin-top:6px}\n.cc-redesign .heat .h-head{font-size:10.5px;color:var(--t3);padding:8px 4px;text-align:center;line-height:1.25;font-weight:500;letter-spacing:-.005em}\n.cc-redesign .heat .h-row-label{font-size:13px;color:var(--t1);padding:14px 0;font-weight:500}\n.cc-redesign .heat .h-cell{aspect-ratio:1.6/1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;transition:outline .1s;font-family:var(--mono);font-variant-numeric:tabular-nums}\n.cc-redesign .heat .h-cell:hover{outline:2px solid var(--t1);outline-offset:-2px}\n.cc-redesign .heat .gap-0{background:#F4F4F5;color:#52525B}\n.cc-redesign .heat .gap-1{background:#FEF3C7;color:#B45309}\n.cc-redesign .heat .gap-2{background:#FDE68A;color:#B45309}\n.cc-redesign .heat .gap-3{background:#FCA5A5;color:#B91C1C}\n.cc-redesign .heat .gap-4{background:#DC2626;color:#fff}\n.cc-redesign .heat-legend{display:flex;gap:14px;font-size:11px;color:var(--t3);margin-top:20px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;align-items:center;font-family:var(--mono)}\n.cc-redesign .heat-legend-lbl{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase}\n.cc-redesign .heat-legend .lg-item{display:flex;align-items:center;gap:6px}\n.cc-redesign .heat-legend .lg-sw{width:14px;height:14px;border-radius:3px}\n\n/* ── Trend SVG ── */\n.cc-redesign .trend-svg{width:100%;height:auto;display:block;margin-top:10px}\n.cc-redesign .trend-meta{display:flex;gap:18px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);font-size:11.5px;color:var(--t3);flex-wrap:wrap}\n.cc-redesign .trend-meta .item{display:flex;align-items:center;gap:6px}\n.cc-redesign .trend-meta .swatch{width:14px;height:3px;border-radius:2px}\n\n/* ── Risk list ── */\n.cc-redesign .risk{padding:14px 0;border-bottom:1px solid var(--border);display:grid;grid-template-columns:12px 1fr auto;gap:14px;align-items:flex-start;cursor:pointer;transition:background .12s;border-radius:6px}\n.cc-redesign .risk:hover{background:var(--surface2);margin:0 -10px;padding-left:10px;padding-right:10px}\n.cc-redesign .risk:last-child{border-bottom:0}\n.cc-redesign .risk-dot{width:10px;height:10px;border-radius:50%;margin-top:6px;flex-shrink:0}\n.cc-redesign .risk.low .risk-dot{background:var(--green)}\n.cc-redesign .risk.med .risk-dot{background:var(--amber)}\n.cc-redesign .risk.high .risk-dot{background:var(--red)}\n.cc-redesign .risk-title{font-family:var(--font);font-size:14px;font-weight:600;color:var(--t1);line-height:1.4;letter-spacing:-.005em}\n.cc-redesign .risk-body{color:var(--t2);font-size:12.5px;margin-top:5px;line-height:1.55}\n.cc-redesign .risk-meta{font-size:10.5px;color:var(--t3);margin-top:7px;text-transform:uppercase;letter-spacing:.08em;font-weight:500;font-family:var(--mono)}\n.cc-redesign .risk-action{color:var(--t1);font-size:12.5px;text-decoration:none;border-bottom:1px solid var(--border2);padding-bottom:1px;white-space:nowrap;align-self:center;cursor:pointer;font-weight:500}\n.cc-redesign .risk-action:hover{border-color:var(--t1)}\n\n/* ── Section nav (dive deeper) ── */\n.cc-redesign .nav-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 22px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:6px;min-height:170px}\n.cc-redesign .nav-card:hover{border-color:var(--ink-4);box-shadow:var(--shadow-sm)}\n.cc-redesign .nav-card-eyebrow{font-size:10.5px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;font-weight:500;font-family:var(--mono)}\n.cc-redesign .nav-card-title{font-family:var(--font); ight:1.6;padding-top:14px;border-top:1px solid var(--border)}\n.cc-redesign .kpi-cell-meta strong{color:var(--t1);font-weight:500}\n\n/* ─── DECISION VERTICAL LIST ─── */\n.cc-redesign .dec-list{display:flex;flex-direction:column;gap:10px}\n.cc-redesign .dec-row{display:grid;grid-template-columns:4px 1fr auto;gap:24px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;cursor:pointer;transition:all .15s}\n.cc-redesign .dec-row:hover{border-color:var(--ink-4);box-shadow:var(--shadow-sm)}\n.cc-redesign .dec-row-stripe{width:4px;border-radius:99px;align-self:stretch;min-height:80px}\n.cc-redesign .dec-row.amber .dec-row-stripe{background:var(--amber)}\n.cc-redesign .dec-row.red .dec-row-stripe{background:var(--red)}\n.cc-redesign .dec-row.teal .dec-row-stripe{background:var(--teal)}\n.cc-redesign .dec-row-body{display:flex;flex-direction:column;min-width:0}\n.cc-redesign .dec-row-tag{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:500;margin-bottom:6px}\n.cc-redesign .dec-row-tit{font-size:16px;font-weight:600;color:var(--t1);line-height:1.4;letter-spacing:-.005em;margin-bottom:6px}\n.cc-redesign .dec-row-desc{font-size:13px;color:var(--t2);line-height:1.6;max-width:760px}\n.cc-redesign .dec-row-foot{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}\n.cc-redesign .dec-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10.5px;color:var(--t2);background:var(--surface2);padding:4px 11px;border-radius:99px;font-weight:500;border:1px solid var(--border);line-height:1.4}\n.cc-redesign .dec-chip-lbl{text-transform:uppercase;letter-spacing:.05em;color:var(--t4);font-size:9.5px}\n.cc-redesign .dec-chip strong{color:var(--t1);font-weight:600;letter-spacing:0}\n.cc-redesign .dec-row-cta{font-size:13px;color:var(--t1);font-weight:500;padding:9px 16px;border:1px solid var(--border);border-radius:6px;background:var(--su 600;color:var(--t1);line-height:1.05;letter-spacing:-.02em}\n.cc-hero-stat-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3)}\n\n/* VITAL SIGNS STRIP */\n.cc-vs{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:32px}\n.cc-vs-tile{padding:20px 22px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:6px;cursor:default;position:relative}\n.cc-vs-tile:last-child{border-right:none}\n.cc-vs-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);font-weight:500}\n.cc-vs-val{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--t1);line-height:1.05;display:flex;align-items:baseline;gap:3px;letter-spacing:-.02em;margin-top:2px}\n.cc-vs-unit{font-size:12px;color:var(--t3);font-weight:500;letter-spacing:0}\n.cc-vs-foot{font-size:11px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-top:2px}\n.cc-vs-trend{color:var(--green-d);font-family:var(--mono);font-weight:600;letter-spacing:-.01em}\n.cc-vs-trend.a{color:var(--amber-d)}\n.cc-vs-trend.r{color:var(--red-d)}\n.cc-vs-thr{color:var(--t3);font-family:var(--mono);letter-spacing:0}\n.cc-vs-spark{display:block;width:100%;height:24px;margin-top:8px;opacity:.85}\n\n/* SECTION SPACING */\n.cc-sec{margin-bottom:0;padding-bottom:48px}\n.cc-sec+.cc-sec{border-top:1px solid var(--border);padding-top:44px}\n.cc-sec-h{display:flex;align-items:baseline;gap:12px;margin-bottom:22px}\n.cc-sec-h-t{font-size:22px;font-weight:700;color:var(--t1);letter-spacing:-.03em;line-height:1.2}\n.cc-sec-h-s{font-size:12.5px;color:var(--t2);font-family:var(--mono);letter-spacing:.01em}\n\n/* ATTENTION SECTION */\n.cc-attn-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}\n.cc-attn{background:#fff;border:1px solid var(--border);border-radius:8px;padding:18px 20px;cursor:pointer;transition:all .1
