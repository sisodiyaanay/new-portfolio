wrap}\n.cc-sep-stats span{display:inline-flex;align-items:baseline;gap:3px}\n.cc-sep-stats strong{color:var(--t1);font-weight:600;font-size:12px}\n\n/* ─────── SECTION PAGE COMPONENTS ─────── */\n.sx-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:22px 0 32px}\n.sx-tile{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:20px 24px}\n.sx-tile-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:10px;font-weight:500}\n.sx-tile-val{font-family:var(--mono);font-size:28px;font-weight:600;color:var(--t1);letter-spacing:-.5px;line-height:1.05;display:flex;align-items:baseline;gap:5px}\n.sx-tile-unit{font-size:13px;color:var(--t3);font-weight:500}\n.sx-tile-sub{font-size:12px;color:var(--t2);margin-top:10px;line-height:1.5;padding-top:10px;border-top:1px solid var(--border)}\n.sx-tile-sub strong{color:var(--t1);font-weight:600}\n\n.sx-card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:24px 28px;margin-bottom:16px}\n.sx-card-h{display:flex;align-items:baseline;gap:8px;margin-bottom:18px;justify-content:space-between;flex-wrap:wrap}\n.sx-card-h-t{font-size:15px;font-weight:600;color:var(--t1);letter-spacing:-.005em}\n.sx-card-h-s{font-size:11.5px;color:var(--t3);margin-left:8px}\n.sx-card-h-act{font-size:12px;color:var(--teal-d);cursor:pointer;font-weight:500;font-family:var(--mono);letter-spacing:.02em}\n.sx-card-h-act:hover{text-decoration:underline}\n\n/* RISK REGISTER */\n.risk-row{display:grid;grid-template-columns:6px 1fr auto auto;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);align-items:center}\n.risk-row:last-child{border-bottom:none;padding-bottom:0}\n.risk-sev{width:6px;height:42px;border-radius:3px;align-self:center}\n.risk-sev.h{background:var(--red)}\n.risk-sev.m{background:var(--amber)}\n.risk-sev.l{background:var(--teal)}\n.risk-tit{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px}\n.risk-sub{font-size:11.5px;color:var(--t2);line-height:1.5}\n.risk-met{font-family:var(--mono);font-size:11px;color:var(--t3);white-space:nowrap;text-align:right;line-height:1.6}\n.risk-met strong{color:var(--t1)}\n.risk-act{font-size:11.5px;color:var(--teal-d);cursor:pointer;white-space:nowrap}\n.risk-act:hover{text-decoration:underline}\n\n/* INTELLIGENCE NAV STRIP (bottom of section pages) */\n.ie-strip{display:flex;gap:10px;flex-wrap:wrap;padding-top:22px;border-top:1px solid var(--border);margin-top:32px;align-items:center}\n.ie-strip-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-right:8px;font-weight:500}\n.ie-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:#fff;border:1px solid var(--border);border-radius:99px;font-size:12px;color:var(--t2);cursor:pointer;transition:all .12s;font-weight:500}\n.ie-chip:hover{background:var(--surface2);border-color:var(--border2);color:var(--t1)}\n.ie-chip-num{font-family:var(--mono);font-size:10px;color:var(--t3);background:var(--surface2);padding:2px 7px;border-radius:99px;font-weight:500}\n.ie-chip:hover .ie-chip-num{background:#fff}\n\n/* BOARD NARRATIVE (culture section) */\n.bn-panel{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:28px 32px;margin-bottom:18px}\n.bn-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:10px}\n.bn-headline{font-size:18px;font-weight:600;color:var(--t1);letter-spacing:-.3px;line-height:1.4;margin-bottom:14px}\n.bn-headline strong{color:var(--teal-d);font-weight:600}\n.bn-body{font-size:13px;color:var(--t2);line-height:1.7;max-width:780px}\n.bn-body p{margin-bottom:10px}\n.bn-body p:last-child{margin-bottom:0}\n.bn-body strong{color:var(--t1);font-weight:500}\n\n/* INVESTMENT REC CARDS */\n.inv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}\n.inv-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:18px 20px}\n.inv-tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--teal-d);text-transform:uppercase;margin-bottom:6px;font-weight:600}\n.inv-title{font-size:13px;font-weight:600;color:var(--t1);line-height:1.35;margin-bottom:5px}\n.inv-desc{font-size:11.5px;color:var(--t2);line-height:1.5;margin-bottom:10px}\n.inv-met{display:flex;gap:14px;font-family:var(--mono);font-size:11px;color:var(--t3);padding-top:8px;border-top:1px solid var(--border);flex-wrap:wrap}\n.inv-met span{display:inline-flex;align-items:baseline;gap:3px}\n.inv-met strong{color:var(--teal-d);font-weight:600}\n\n/* CANDIDATE/STAFF TABLE styling reuse via btbl */\n.ct-status{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase}\n.ct-status.r{background:#FEE2E2;color:var(--red-d);border:1px solid #FECACA}\n.ct-status.a{background:#FEF3C7;color:var(--amber-d);border:1px solid #FDE68A}\n.ct-status.g{background:#F4F4F5;color:var(--teal-d);border:1px solid #E4E4E7}\n.ct-status.n{background:var(--surface2);color:var(--t3);border:1px solid var(--border)}\n\n/* PHASE 2 ROADMAP STRIP */\n.p2-roadmap{background:var(--surface2);border:1px dashed var(--border2);border-radius:var(--rl);padding:22px 26px;margin-bottom:18px}\n.p2-roadmap-h{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:6px}\n.p2-roadmap-s{font-size:11.5px;color:var(--t3);margin-bottom:12px}\n.p2-roadmap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}\n.p2-q{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px}\n.p2-q-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal-d);margin-bottom:4px;font-weight:600}\n.p2-q-list{font-size:11.5px;color:var(--t2);line-height:1.55}\n\n/* ─────── COMPLIANCE & RISK — NEW VISUAL COMPONENTS ─────── */\n\n/* AUDIT POSTURE HERO */\n.ap-hero{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:28px 32px;margin-bottom:24px}\n.ap-h-top{display:flex;justify-content:space-between;align-items:flex-start;gap:40px;margin-bottom:24px}\n.ap-h-l{display:flex;flex-direction:column;gap:8px;min-width:0;flex:1}\n.ap-h-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;margin-bottom:2px;font-weight:500}\n.ap-h-title{font-size:18px;font-weight:600;color:var(--t1);letter-spacing:-.2px;line-height:1.45}\n.ap-h-narr{font-size:13px;color:var(--t2);line-height:1.7;max-width:600px;margin-top:8px}\n.ap-h-narr strong{color:var(--t1);font-weight:500}\n.ap-h-r{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:170px}\n.ap-h-score{font-family:var(--mono);font-size:52px;font-weight:600;letter-spacing:-2px;color:var(--t1);line-height:1}\n.ap-h-score .s-of{font-size:16px;color:var(--t3);font-weight:500;letter-spacing:0}\n.ap-h-trend{font-family:var(--mono);font-size:12px;color:var(--teal-d);font-weight:600}\n.ap-h-trend-sub{font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}\n.ap-h-spark{display:block;width:90px;height:36px;margin-top:10px;opacity:.9}\n\n/* AUDIT SCORE PROGRESS TRACK */\n.ap-track{margin:20px 0 6px;padding-bottom:20px}\n.ap-track-head{display:flex;gap:20px;margin-bottom:10px;font-family:var(--mono);font-size:10.5px;flex-wrap:wrap}\n.ap-track-cur{color:var(--teal-d);font-weight:700}\n.ap-track-thr{color:var(--t3)}\n.ap-track-proj{color:var(--t3)}\n.ap-track-bar{position:relative;height:8px;background:var(--surface2);border-radius:99px}\n.ap-track-fill{height:100%;background:var(--teal);border-radius:99px}\n.ap-track-tick{position:absolute;top:-5px;width:2px;height:18px;background:var(--t3);border-radius:1px;transform:translateX(-50%)}\n.ap-track-tick.proj{background:var(--teal);opacity:.6;border-style:dashed}\n.ap-track-scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:6px;letter-spacing:.05em}\n\n/* AUDIT POSTURE STEPS (NOW → THRESHOLD → PROJECTED) */\n.ap-scale{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding-top:24px;border-top:1px solid var(--border)}\n.ap-step{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;flex-direction:column;gap:5px;position:relative}\n.ap-step.now{background:var(--teal-l);border-color:rgba(24,24,27,.22)}\n.ap-step.proj{border-style:dashed}\n.ap-step-lbl{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);font-weight:600}\n.ap-step.now .ap-step-lbl{color:var(--teal-d)}\n.ap-step-val{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--t1);letter-spacing:-.5px;line-height:1.1;display:flex;align-items:baseline;gap:4px}\n.ap-step-val .ap-step-unit{font-size:13px;color:var(--t3);font-weight:500}\n.ap-step.now .ap-step-val{color:var(--teal-d)}\n.ap-step.proj .ap-step-val{color:var(--t2)}\n.ap-step-sub{font-size:12px;color:var(--t2);line-height:1.5;margin-top:4px}\n.ap-step-arr{position:absolute;right:-12px;top:50%;transform:translateY(-50%);width:20px;height:20px;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--border);border-radius:50%;color:var(--t3);font-size:11px;font-family:var(--mono);z-index:2}\n\n/* CONTROL COVERAGE — TILE GRID */\n.ct-group{margin-bottom:26px}\n.ct-group:last-child{margin-bottom:0}\n.ct-group-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border);gap:12px}\n.ct-group-t{font-family:var(--mono);font-size:11.5px;font-weight:600;color:var(--t1);text-transform:uppercase;letter-spacing:.08em}\n.ct-group-t strong{color:var(--teal-d)}\n.ct-group-s{font-size:11px;color:var(--t3)}\n.ct-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}\n.ct-tile{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 18px;cursor:default;transition:none;position:relative;display:flex;flex-direction:column;gap:10px;min-height:150px}\n.ct-tile:hover{}\n.ct-tile.phase2{border-style:dashed;background:#FAFAFA;cursor:default}\n.ct-tile.phase2:hover{transform:none;box-shadow:none;border-color:var(--border2)}\n.ct-tile-top{display:flex;justify-content:space-between;align-items:center}\n.ct-tile-num{font-family:var(--mono);font-size:11px;color:var(--t3);font-weight:500;letter-spacing:.02em}\n.ct-tile-stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}\n.ct-tile-stat-dot.g{background:var(--teal)}\n.ct-tile-stat-dot.a{background:var(--amber)}\n.ct-tile-stat-dot.n{background:#CBD5E1}\n.ct-tile-name{font-size:12px;font-weight:600;color:var(--t1);line-height:1.4;flex:1}\n.ct-tile.phase2 .ct-tile-name{color:var(--t3);font-weight:500}\n.ct-tile-score{display:flex;align-items:center;gap:7px}\n.ct-tile-score-v{font-family:var(--mono);font-size:17px;font-weight:600;color:var(--t1);line-height:1}\n.ct-tile.phase2 .ct-tile-score-v{display:none}\n.ct-tile-score-bar{flex:1;height:4px;background:var(--surface2);border-radius:99px;overflow:hidden}\n.ct-tile-score-fil{height:100%;background:var(--teal);border-radius:99px}\n.ct-tile-score-fil.a{background:var(--amber)}\n.ct-tile-pack{font-size:10px;color:var(--teal-d);font-weight:500;font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}\n.ct-tile.phase2 .ct-tile-pack{color:var(--t3)}\n.ct-tile.phase2 .ct-tile-pack::before{content:\"\"}\n/* ── CONTROL ROW LIST (redesigned control coverage) ── */\n.ctr-list{display:flex;flex-direction:column}\n.ctr-row{display:flex;align-items:center;gap:14px;padding:11px 0;border-bottom:1px solid var(--border)}\n.ctr-row:last-child{border-bottom:none}\n.ctr-code{font-family:var(--mono);font-size:11px;color:var(--t3);width:38px;flex-shrink:0;letter-spacing:.02em}\n.ctr-name{font-size:13px;font-weight:500;color:var(--t1);width:190px;flex-shrink:0}\n.ctr-row.inactive .ctr-name{color:var(--t3);font-weight:400}\n.ctr-bar-wrap{flex:1;height:5px;background:var(--surface2);border-radius:99px;overflow:hidden;min-width:80px}\n.ctr-bar-fill{height:100%;border-radius:99px;background:var(--teal)}\n.ctr-bar-fill.amber{background:var(--amber)}\n.ctr-bar-fill.inactive{background:#E2E8F0}\n.ctr-score{font-family:var(--mono);font-size:13.5px;font-weight:600;color:var(--t1);width:26px;text-align:right;flex-shrink:0}\n.ctr-row.inactive .ctr-score{color:var(--t3)}\n.ctr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}\n.ctr-dot.g{background:var(--teal)}\n.ctr-dot.a{background:var(--amber)}\n.ctr-dot.n{background:#CBD5E1}\n.ct-legend{display:flex;gap:14px;font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-top:14px;padding-top:12px;border-top:1px solid var(--border);align-items:center}\n.ct-legend-item{display:inline-flex;align-items:center;gap:5px}\n.ct-legend-dot{width:7px;height:7px;border-radius:50%}\n\n/* RISK — HERO CARD (HIGH SEVERITY) */\n.risk-hero{background:#fff;border:1px solid var(--border);border-left:4px solid var(--red);border-radius:10px;padding:22px 28px;margin-bottom:14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}\n.risk-hero:hover{box-shadow:0 2px 8px -1px rgba(0,0,0,.08)}\n.risk-hero-top{display:flex;align-items:flex-start;gap:20px;justify-content:space-between;margin-bottom:14px}\n.risk-hero-tag{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--red-d);text-transform:uppercase;font-weight:600;margin-bottom:8px;display:inline-block}\n.risk-hero-title{font-size:18px;font-weight:600;color:var(--t1);letter-spacing:-.2px;line-height:1.35}\n.risk-hero-meta{font-family:var(--mono);font-size:11px;color:var(--t3);white-space:nowrap;text-align:right;line-height:1.7}\n.risk-hero-meta strong{color:var(--t1);font-size:13px}\n.risk-hero-desc{font-size:13.5px;color:var(--t2);line-height:1.65;margin-bottom:18px;max-width:740px}\n.risk-hero-plan{background:var(--surface2);border-radius:8px;padding:16px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:22px}\n.risk-hero-step{display:flex;gap:12px;align-items:flex-start}\n.risk-hero-step-n{font-family:var(--mono);font-size:10px;font-weight:600;color:#fff;background:var(--red-d);min-width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}\n.risk-hero-step-t{font-size:12px;color:var(--t2);line-height:1.6}\n.risk-hero-step-t strong{color:var(--t1);font-weight:500}\n\n/* RISK — MINI CARDS (MEDIUM/LOW) */\n.risk-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}\n.risk-mini{background:#fff;border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:10px;padding:18px 20px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;min-height:160px}\n.risk-mini.l{border-left-color:var(--teal)}\n.risk-mini:hover{box-shadow:0 2px 8px -1px rgba(0,0,0,.06);border-color:var(--border2)}\n.risk-mini-tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--amber-d);margin-bottom:8px}\n.risk-mini.l .risk-mini-tag{color:var(--teal-d)}\n.risk-mini-title{font-size:13.5px;font-weight:600;color:var(--t1);line-height:1.4;margin-bottom:8px;letter-spacing:-.005em}\n.risk-mini-desc{font-size:12px;color:var(--t2);line-height:1.6;flex:1;margin-bottom:14px}\n.risk-mini-foot{font-family:var(--mono);font-size:11px;color:var(--t3);padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}\n.risk-mini-foot strong{color:var(--t1)}\n.risk-mini-link{color:var(--teal-d);font-weight:500;font-family:var(--font);text-transform:none;letter-spacing:normal}\n\n/* SECURITY ACTIVITY SUMMARY (REPLACES LOG TABLE) */\n.sa-grid{display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:0;align-items:stretch}\n.sa-block{display:flex;flex-direction:column;gap:10px;padding-right:28px;border-right:1px solid var(--border)}\n.sa-block:last-child{padding-right:0;padding-left:28px;border-right:none;border-left:none}\n.sa-block:nth-child(2){padding-left:28px;padding-right:28px;border-right:1px solid var(--border)}\n.sa-block-h{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);font-weight:600;margin-bottom:4px}\n/* bar chart layout */\n.sa-chart-area{display:flex;flex-direction:column;gap:0}\n.sa-chart-vals{display:flex;gap:6px;padding:0 2px;margin-bottom:5px}\n.sa-chart-vals span{flex:1;text-align:center;font-family:var(--mono);font-size:10px;color:var(--t2);font-weight:500}\n.sa-bars-row{display:flex;align-items:flex-end;gap:6px;height:64px;padding:0 2px;border-bottom:1.5px solid var(--border)}\n.sa-bar-col{flex:1;display:flex;justify-content:center;align-items:flex-end;height:100%}\n.sa-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px}\n.sa-bar.c-amber{background:var(--amber)}\n.sa-bar.c-amber-dim{background:#FCD34D}\n.sa-days-row{display:flex;gap:6px;padding:0 2px;margin-top:6px}\n.sa-days-row span{flex:1;text-align:center;font-size:10px;color:var(--t3);font-family:var(--mono);font-weight:500}\n.sa-foot{font-size:11.5px;color:var(--t3);line-height:1.55;margin-top:6px}\n.sa-bigstat-row{display:flex;gap:24px;margin-bottom:4px}\n.sa-bigstat{display:flex;flex-direction:column;gap:2px}\n.sa-bigstat-v{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--t1);letter-spacing:-.4px;line-height:1}\n.sa-bigstat-v.ok{color:var(--teal-d)}\n.sa-bigstat-l{font-size:11px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}\n.sa-guarantee{background:var(--teal-l);border:1px solid rgba(24,24,27,.18);border-radius:6px;padding:11px 13px;font-size:11.5px;color:var(--teal-d);line-height:1.55;margin-top:auto}\n.sa-guarantee strong{color:var(--teal-d);font-weight:600;display:block;margin-bottom:3px}\n\n/* CONTROL COVERAGE RING */\n.ct-ring{display:block;flex-shrink:0}\n.ct-group-head-r{display:flex;align-items:center;gap:10px}\n\n/* BBR improvements */\n.bbr{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}\n.bbr:last-child{border-bottom:none}\n.bbr-lbl{font-size:12.5px;color:var(--t2);min-width:130px;flex-shrink:0}\n.bbr-trk{flex:1;height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}\n.bbr-fil{height:100%;border-radius:99px}\n.bbr-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t1);min-width:24px;text-align:right;letter-spacing:-.02em}\n.bbr-pct{font-family:var(--mono);font-size:10.5px;color:var(--t3);min-width:70px;text-align:right;letter-spacing:.02em;white-space:nowrap}\n\n/* ─────── PEOPLE & CAPABILITY — VISUAL COMPONENTS ─────── */\n\n/* TALENT HISTOGRAM (in hero) */\n.hist-row{display:flex;gap:8px;align-items:flex-end;height:110px;margin-top:12px}\n.hist-col{flex:1;display:flex;flex-direction:column;gap:5px;align-items:center;justify-content:flex-end}\n.hist-bar{width:100%;border-radius:5px 5px 0 0;display:flex;align-items:flex-start;justify-content:center;padding-top:4px;min-height:18px;transition:all .2s}\n.hist-bar-count{font-family:var(--mono);font-size:12px;font-weight:600;color:#fff;line-height:1}\n.hist-bar.dim .hist-bar-count{color:var(--t2)}\n.hist-lbl{font-family:var(--mono);font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;text-align:center;line-height:1.3}\n.hist-lbl strong{color:var(--t1);display:block;font-size:11px;font-weight:600;margin-bottom:1px}\n\n/* PROMOTION CANDIDATE CARDS (horizontal rows) */\n.pc-list{display:flex;flex-direction:column;gap:11px}\n\n\n.pc-card.featured{border-color:rgba(24,24,27,.3)}\n.pc-l{display:flex;align-items:center;gap:14px;min-width:170px}\n.pc-id-wrap{display:flex;flex-direction:column;gap:2px}\n.pc-id{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-.2px}\n.pc-team{font-size:10px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}\n.pc-band{padding:3px 9px;border-radius:99px;font-size:9.5px;font-family:var(--mono);font-weight:600;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}\n.pc-band.native{background:#18181B;color:#fff}\n.pc-band.prof{background:var(--teal-l);color:var(--teal-d);border:1px solid rgba(24,24,27,.22)}\n.pc-m{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}\n.pc-dim{display:flex;flex-direction:column;gap:3px;min-width:0}\n.pc-dim-l{font-size:10.5px;color:var(--t3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n.pc-dim-v{display:flex;align-items:center;gap:6px;margin-top:1px}\n.pc-dim-num{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t1);min-width:24px}\n.pc-dim-bar{flex:1;height:3px;background:var(--surface2);border-radius:99px;overflow:hidden;max-width:80px}\n.pc-dim-fil{height:100%;background:var(--teal);border-radius:99px}\n.pc-r{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:130px}\n.pc-rec{padding:5px 11px;border-radius:99px;font-size:10.5px;font-weight:600;letter-spacing:.03em;white-space:nowrap;font-family:var(--mono);text-transform:uppercase}\n.pc-rec.g{background:var(--teal);color:#fff}\n.pc-rec.a{background:var(--amber);color:#fff}\n.pc-rec.n{background:var(--surface2);color:var(--t3);border:1px solid var(--border)}\n.pc-decisions{font-family:var(--mono);font-size:10.5px;color:var(--t3);letter-spacing:.04em}\n.pc-decisions strong{color:var(--t1);font-weight:600}\n\n/* TALENT STRATEGY PANEL */\n.ts-panel{display:grid;grid-template-columns:1fr 1fr;gap:36px}\n.ts-half-h{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px}\n.ts-half-s{font-size:11.5px;color:var(--t2);line-height:1.55;margin-bottom:12px}\n\n/* COHORT COACHING CARDS */\n.ch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}\n.ch-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px 20px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;min-height:220px}\n.ch-card.high{border-top:3px solid var(--red)}\n.ch-card.med{border-top:3px solid var(--amber)}\n.ch-card.low{border-top:3px solid var(--teal)}\n.ch-card-h{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}\n.ch-card-t{font-size:12.5px;font-weight:600;color:var(--t1);line-height:1.4}\n.ch-card-size{font-family:var(--mono);font-size:10.5px;color:var(--t2);background:var(--surface2);padding:3px 9px;border-radius:99px;white-space:nowrap;font-weight:500;flex-shrink:0}\n.ch-card-body{font-size:12px;color:var(--t2);line-height:1.65;flex:1}\n.ch-card-path{font-family:var(--mono);font-size:10px;color:var(--teal-d);text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;background:var(--surface2);border-radius:6px;line-height:1.5;font-weight:500}\n.ch-card-inv{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;padding-top:8px;border-top:1px solid var(--border)}\n.ch-card.high .ch-card-inv{color:var(--red-d)}\n.ch-card.med .ch-card-inv{color:var(--amber-d)}\n.ch-card.low .ch-card-inv{color:var(--teal-d)}\n\n/* SUCCESSION RISK CARDS */\n.suc-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}\n\n/* ─────── DOMAIN & KNOWLEDGE — VISUAL COMPONENTS ─────── */\n\n/* DOMAIN BID-READINESS CARDS */\n.dom-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}\n.dom-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px 22px;display:flex;flex-direction:column;gap:14px;cursor:pointer;transition:all .15s;position:relative;min-height:210px}\n.dom-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 14px -3px rgba(0,0,0,.08)}\n.dom-card.lead{border-top:3px solid var(--teal)}\n.dom-card.partial{border-top:3px solid var(--amber)}\n.dom-card.nobid{border-top:3px solid var(--red);background:linear-gradient(180deg,#FFFBFB 0%,#fff 18%)}\n.dom-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}\n.dom-card-name{font-size:14.5px;font-weight:600;color:var(--t1);letter-spacing:-.2px;line-height:1.3}\n.dom-card-rec{padding:4px 11px;border-radius:99px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-family:var(--mono);white-space:nowrap;flex-shrink:0}\n.dom-card-rec.g{background:var(--teal);color:#fff}\n.dom-card-rec.a{background:var(--amber);color:#fff}\n.dom-card-rec.r{background:var(--red);color:#fff}\n.dom-card-depth{display:flex;align-items:center;gap:10px;margin-top:2px}\n.dom-card-depth-v{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--t1);letter-spacing:-.5px;line-height:1}\n.dom-card-depth-unit{font-size:11px;color:var(--t3);font-family:var(--mono)}\n.dom-card-depth-bar{flex:1;height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}\n.dom-card-depth-fil{height:100%;border-radius:99px}\n.dom-card-depth-fil.g{background:var(--teal)}\n.dom-card-depth-fil.a{background:var(--amber)}\n.dom-card-depth-fil.r{background:var(--red)}\n.dom-card-narr{font-size:11.5px;color:var(--t2);line-height:1.55;flex:1}\n.dom-card.nobid .dom-card-narr{color:var(--red-d);font-weight:500}\n.dom-card-meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;padding-top:9px;border-top:1px solid var(--border)}\n.dom-card-meta strong{color:var(--t1);font-size:11px}\n\n/* CONCENTRATION RISK CARDS */\n.con-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:10px;display:grid;grid-template-columns:4px minmax(0,1fr) 560px;gap:20px;align-items:center;cursor:pointer;transition:all .15s}\n.con-card:hover{background:var(--surface2);box-shadow:0 1px 3px rgba(0,0,0,.04)}\n.con-sev{width:6px;height:54px;border-radius:3px;align-self:center}\n.con-sev.h{background:var(--red)}\n.con-sev.m{background:var(--amber)}\n.con-sev.l{background:var(--teal)}\n.con-l{display:flex;flex-direction:column;gap:3px;min-width:0}\n.con-tit{font-size:13px;font-weight:600;color:var(--t1);line-height:1.4}\n.con-sub{font-size:11.5px;color:var(--t2);line-height:1.55}\n.con-viz{display:flex;flex-direction:column;gap:6px}\n.con-viz-h{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--t3);font-weight:600}\n.con-viz-bars{display:flex;gap:5px;align-items:center;height:24px}\n.con-viz-bar{flex:1;border-radius:3px;display:flex;align-items:center;justify-content:center;height:24px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.04em}\n.con-viz-bar.full{background:var(--red);color:#fff}\n.con-viz-bar.med{background:var(--amber);color:#fff}\n.con-viz-bar.empty{background:#F1F5F9;color:var(--t3)}\n.con-r{font-family:var(--mono);font-size:11px;color:var(--t3);text-align:right;line-height:1.6;white-space:nowrap}\n.con-r strong{color:var(--t1)}\n.con-r .con-link{color:var(--teal-d);font-family:var(--font);cursor:pointer;font-weight:500;display:block;margin-top:3px}\n\n/* DECISION CONTRADICTION CARDS */\n.dc-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:22px 26px;margin-bottom:12px}\n.dc-row{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;align-items:center}\n.dc-side{display:flex;flex-direction:column;gap:3px}\n.dc-eyebrow{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:3px}\n.dc-side.now .dc-eyebrow{color:var(--amber-d)}\n.dc-side.then .dc-eyebrow{color:var(--t3)}\n.dc-tit{font-size:13px;font-weight:600;color:var(--t1);line-height:1.4;margin-bottom:3px}\n.dc-sub{font-size:11.5px;color:var(--t2);line-height:1.55}\n.dc-side.then .dc-tit{color:var(--t2)}\n.dc-vs{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:var(--t3);font-weight:600;flex-shrink:0}\n.dc-foot{padding-top:12px;border-top:1px solid var(--border);margin-top:14px;display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:var(--t3);font-family:var(--mono)}\n.dc-foot strong{color:var(--t1);font-family:var(--font);font-weight:500}\n.dc-foot a{color:var(--teal-d);cursor:pointer;font-weight:500;font-family:var(--font)}\n.dc-foot a:hover{text-decoration:underline}\n\n/* DEAD-END CARDS */\n.de-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}\n.de-card{background:#FAFAFA;border:1px solid var(--border);border-radius:10px;padding:16px 18px;display:flex;flex-direction:column;gap:10px;border-left:3px solid #CBD5E1;min-height:148px}\n.de-card-top{display:flex;justify-content:space-between;align-items:center;gap:8px}\n.de-card-dom{font-family:var(--mono);font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;background:#fff;padding:3px 9px;border-radius:99px;border:1px solid var(--border)}\n.de-card-iter{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.04em}\n.de-card-tit{font-size:12.5px;font-weight:600;color:var(--t2);line-height:1.4;text-decoration:line-through;text-decoration-color:#94A3B8;text-decoration-thickness:1px}\n.de-card-why{font-size:11.5px;color:var(--t2);line-height:1.55;flex:1;font-style:italic}\n.de-card-foot{font-family:var(--mono);font-size:10px;color:var(--t3);padding-top:7px;border-top:1px solid var(--border);text-transform:uppercase;letter-spacing:.04em}\n\n/* ─────── CULTURE & STRATEGY — ENHANCED COMPONENTS ─────── */\n\n/* VALUE SNAPSHOT in board narrative panel */\n.vs-snapshot{display:grid;grid-template-columns:repeat(2,1fr);gap:11px;margin-top:16px}\n.vs-snap-tile{background:rgba(24,24,27,.05);border:1px solid rgba(24,24,27,.18);border-radius:10px;padding:13px 15px}\n.vs-snap-lbl{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--teal-d);font-weight:600;margin-bottom:4px}\n.vs-snap-val{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--t1);letter-spacing:-.4px;line-height:1.1;display:flex;align-items:baseline;gap:4px}\n.vs-snap-unit{font-size:11px;color:var(--t3);font-weight:500}\n.vs-snap-sub{font-size:10.5px;color:var(--t2);line-height:1.4;margin-top:4px}\n\n/* BOARD NARRATIVE — two-column layout */\n.bn-panel-2col{display:grid;grid-template-columns:1.5fr 1fr;gap:32px}\n.bn-panel-r{display:flex;flex-direction:column;gap:8px;border-left:1px solid var(--border);padding-left:28px}\n.bn-panel-r-h{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600;margin-bottom:4px}\n\n/* TRAJECTORY CHART (uses tc-bars) */\n.tj-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:28px;align-items:start}\n.tj-l{display:flex;flex-direction:column;gap:14px}\n\n/* ENHANCED INVESTMENT CARD with delta viz */\n.inv-delta{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid rgba(24,24,27,.22);border-radius:8px;padding:10px 14px;margin-top:12px;justify-content:space-between}\n.inv-delta-l{display:flex;flex-direction:column;gap:1px}\n.inv-delta-now{font-family:var(--mono);font-size:10.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}\n.inv-delta-nval{font-family:var(--mono);font-size:13px;color:var(--t2);font-weight:500}\n.inv-delta-arrow{color:var(--teal-d);font-family:var(--mono);font-size:13px;font-weight:600;align-self:center}\n.inv-delta-r{display:flex;flex-direction:column;gap:1px;align-items:flex-end}\n.inv-delta-proj{font-family:var(--mono);font-size:16px;color:var(--teal-d);font-weight:600;letter-spacing:-.3px}\n.inv-delta-plbl{font-family:var(--mono);font-size:10.5px;color:var(--teal-d);text-transform:uppercase;letter-spacing:.05em}\n\n/* ─────── INTELLIGENCE DETAIL PAGE ─────── */\n.ip-back{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;color:var(--t2);text-decoration:none;cursor:pointer;margin-bottom:18px;padding:6px 14px;border-radius:6px;background:#fff;border:1px solid var(--border);font-weight:500}\n.ip-back:hover{background:var(--surface2);color:var(--t1)}\n.ip-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:16px}\n.ip-eyebrow{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:4px}\n.ip-title{font-size:28px;font-weight:600;color:var(--t1);letter-spacing:-.5px;line-height:1.15}\n.ip-num{font-size:14px;font-family:var(--mono);color:var(--t3);background:var(--surface2);border:1px solid var(--border);padding:5px 14px;border-radius:99px;white-space:nowrap;flex-shrink:0;font-weight:500}\n.ip-badges{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}\n.ip-desc{font-size:14px;color:var(--t2);line-height:1.65;margin-top:12px;margin-bottom:4px}\n\n.ip-hero{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:26px 32px;margin:20px 0 22px;display:flex;align-items:flex-end;justify-content:space-between;gap:24px}\n.ip-hero-l{display:flex;flex-direction:column}\n.ip-hero-val{font-size:58px;font-weight:600;font-family:var(--mono);color:var(--t1);letter-spacing:-2.5px;line-height:.95;display:flex;align-items:baseline;gap:8px}\n.ip-hero-unit{font-size:22px;color:var(--t3);font-weight:500}\n.ip-hero-tag{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;padding:4px 11px;border-radius:99px;margin-top:10px;align-self:flex-start}\n.ip-hero-note{font-size:12.5px;color:var(--t3);margin-top:12px;line-height:1.55;max-width:480px}\n.ip-hero-r{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:6px}\n.ip-hero-trend{font-size:13px;color:var(--green-d);font-weight:500;display:flex;align-items:center;gap:4px}\n.ip-hero-trend.a{color:var(--amber-d)}\n.ip-hero-rlbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);font-weight:600}\n\n/* IP LAYOUT */\n.ip-layout{display:grid;grid-template-columns:1fr 310px;gap:22px;align-items:flex-start}\n.ip-main{display:flex;flex-direction:column;gap:18px;min-width:0}\n.ip-rail{display:flex;flex-direction:column;gap:14px}\n@media (max-width:1100px){.ip-layout{grid-template-columns:1fr}}\n\n.ip-card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:22px 24px}\n.ip-card-ti{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}\n.ip-card-sub{font-size:11.5px;color:var(--t3);font-weight:400;text-transform:none;letter-spacing:0}\n\n/* Trend chart */\n.tc-bars{display:flex;align-items:flex-end;gap:8px;height:140px;padding:0 4px}\n.tc-col{flex:1;display:flex;flex-direction:column;align-items:center}\n.tc-bar-wrap{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center;min-height:120px}\n.tc-bar{width:100%;background:var(--teal);border-radius:4px 4px 0 0;min-height:5px;transition:height .3s}\n.tc-bar.amber{background:var(--amber)}\n.tc-bar.dim{background:#A1A1AA}\n.tc-bar.amber-dim{background:#FCD34D}\n.tc-bar.gray{background:#E2E8F0}\n.tc-day{font-size:10px;color:var(--t3);margin-top:7px;font-family:var(--mono);font-weight:500}\n.tc-val{font-size:9.5px;font-family:var(--mono);color:var(--t2);margin-bottom:3px}\n.tc-foot{font-size:12px;color:var(--t3);margin-top:12px;line-height:1.55}\n\n/* Big bar rows (in detail pages) */\n.bbr{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)}\n.bbr:last-child{border-bottom:none}\n.bbr-lbl{font-size:12.5px;color:var(--t1);width:160px;flex-shrink:0;font-weight:500}\n.bbr-trk{flex:1;height:8px;background:#EFEFEF;border-radius:99px;overflow:hidden}\n.bbr-fil{height:100%;border-radius:99px}\n.bbr-val{font-size:12.5px;font-family:var(--mono);color:var(--t1);width:50px;text-align:right;flex-shrink:0;font-weight:500}\n.bbr-pct{font-size:10.5px;color:var(--t3);width:70px;text-align:right;flex-shrink:0;white-space:nowrap}\n\n/* Big table (in detail pages) */\n.btbl{width:100%;border-collapse:collapse;font-size:12.5px}\n.btbl th{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);padding:9px 8px;text-align:left;border-bottom:1px solid var(--border);background:var(--surface2)}\n.btbl td{padding:11px 8px;border-bottom:1px solid var(--border);color:var(--t2);line-height:1.4}\n.btbl tr:last-child td{border-bottom:none}\n.btbl .bold{font-weight:600;color:var(--t1)}\n.btbl .mono{font-family:var(--mono);font-size:12px}\n\n/* Methodology + text */\n.ip-text{font-size:13.5px;color:var(--t2);line-height:1.7}\n.ip-text strong{color:var(--t1);font-weight:600}\n.ip-text p{margin-bottom:12px}\n.ip-text p:last-child{margin-bottom:0}\n\n/* Action items */\n.ai-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}\n.ai-item:last-child{border-bottom:none}\n.ai-icon{width:24px;height:24px;border-radius:6px;background:var(--teal-l);color:var(--teal-d);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}\n.ai-icon.a{background:var(--amber-l);color:var(--amber-d)}\n.ai-icon.r{background:var(--red-l);color:var(--red-d)}\n.ai-text{font-size:13px;line-height:1.6;color:var(--t2)}\n.ai-text strong{color:var(--t1);font-weight:600}\n\n/* Rail cards */\n.rc-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:12.5px}\n.rc-row:last-child{border-bottom:none}\n.rc-row-l{color:var(--t2)}\n.rc-row-r{color:var(--t1);font-weight:500;font-family:var(--mono);font-size:11.5px}\n.rc-list{list-style:none}\n.rc-list li{padding:10px 0;border-bottom:1px solid var(--border);font-size:12.5px;color:var(--t2);line-height:1.4;cursor:pointer}\n.rc-list li:hover{color:var(--t1)}\n.rc-list li:last-child{border-bottom:none}\n.rc-list li .rc-num{font-size:10px;font-family:var(--mono);color:var(--t3);margin-right:5px}\n\n/* Heatmap (for #16) */\n.hm{display:grid;gap:3px;font-size:10.5px}\n.hm-row{display:grid;grid-template-columns:90px repeat(6,1fr);gap:3px;align-items:center}\n.hm-rl{font-size:10.5px;color:var(--t2);font-weight:500;padding-right:6px}\n.hm-cell{height:30px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-family:var(--mono);color:#fff;font-weight:600}\n.hm-h{padding:0 4px;font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;text-align:center;font-weight:600;padding-bottom:4px}\n\n/* DECISION REGISTRY */\n.reg-search-wrap{position:relative;flex:1}\n.reg-si{width:100%;height:44px;border:1px solid var(--border);border-radius:10px;padding:0 14px 0 42px;font-size:14px;font-family:var(--font);color:var(--t1);outline:none;background:#fff}\n.reg-si:focus{border-color:var(--t3);box-shadow:0 0 0 3px rgba(0,0,0,.04)}\n.reg-si-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none}\n.reg-filters{display:flex;align-items:center;gap:8px;margin:12px 0 18px;flex-wrap:wrap}\n.rf{height:32px;padding:0 14px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--t2);background:#fff;transition:all .1s;letter-spacing:-.005em}\n.rf:hover{border-color:var(--border2);background:var(--surface2)}\n.rf.on{background:var(--t1);color:#fff;border-color:var(--t1)}\n.reg-tbl{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden}\n.reg-row{display:grid;grid-template-columns:1fr 110px 110px 140px;align-items:start;padding:16px 20px;border-bottom:1px solid var(--border);gap:14px;cursor:pointer;transition:background .12s}\n.reg-row:hover{background:var(--surface2)}\n.reg-row.hdr{background:var(--surface2);cursor:default;align-items:center;padding:11px 20px}\n.reg-row.hdr span{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-family:var(--mono)}\n.reg-row:last-child{border-bottom:none}\n.rrt{font-size:13.5px;font-weight:500;color:var(--t1);line-height:1.4;display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;letter-spacing:-.005em}\n.rrs{font-size:12px;color:var(--t3);margin-top:5px;line-height:1.5}\n.rrteam{font-size:12.5px;color:var(--t2);font-weight:500}\n.rrdate{font-size:12px;font-family:var(--mono);color:var(--t3);letter-spacing:.02em}\n\n/* REGISTRY BREAKDOWN + ROW VARIANTS */\n.reg-breakdown{background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:24px}\n.reg-bd-col-h{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600;margin-bottom:14px}\n.reg-bd-rows{display:flex;flex-direction:column;gap:11px}\n.reg-bd-row{display:flex;align-items:center;gap:12px}\n.reg-bd-lbl{font-size:12.5px;color:var(--t1);width:110px;flex-shrink:0;font-weight:500}\n.reg-bd-trk{flex:1;height:7px;background:var(--surface2);border-radius:99px;overflow:hidden}\n.reg-bd-fil{height:100%;border-radius:99px;background:var(--teal)}\n.reg-bd-fil.dend{background:var(--border2)}\n.reg-bd-val{font-family:var(--mono);font-size:12px;color:var(--t1);width:20px;text-align:right;font-weight:600}\n.reg-row.contr{border-left:3px solid var(--amber)}\n.reg-row.dend{border-left:3px solid var(--border2)}\n.reg-row.dend .rrt{text-decoration:line-through;text-decoration-color:var(--border2);text-decoration-thickness:1px}\n.reg-row.contr:hover{background:var(--amber-l)}\n.reg-row.dend:hover{background:var(--surface2)}\n.reg-velocity-col-h{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600;margin-bottom:14px}\n\n/* PERSONAL PAGES */\n.priv-banner{background:#F9F9F9;border:1px dashed var(--border2);border-radius:var(--r);padding:9px 14px;display:flex;align-items:center;gap:8px;margin-bottom:18px}\n.priv-banner svg{flex-shrink:0;color:var(--t3)}\n.priv-banner-t{font-size:12px;color:var(--t3);line-height:1.5}\n.insight-card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px;margin-bottom:10px;transition:all .15s;border-left:3px solid var(--border)}\n.insight-card.clean{border-left-color:var(--teal)}\n.insight-card.watch{border-left-color:var(--amber)}\n.ic-badge-p{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;margin-bottom:8px}\n.ic-badge-p.teal{background:var(--teal-l);color:var(--teal-d)}\n.ic-badge-p.amber{background:var(--amber-l);color:var(--amber-d)}\n.ic-title-p{font-size:14.5px;font-weight:600;color:var(--t1);line-height:1.3;margin-bottom:4px}\n.ic-desc-p{font-size:12.5px;color:var(--t2);line-height:1.55}\n.ic-meta-p{font-size:11px;color:var(--t3);margin-top:8px;display:flex;align-items:center;gap:6px}\n.prompt-card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:8px;transition:all .15s}\n.prompt-ti{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:3px}\n.prompt-tx{font-size:11.5px;color:var(--t2);line-height:1.55;font-family:var(--mono);background:var(--surface2);border-radius:5px;padding:8px 10px;margin-top:7px}\n.prompt-me{font-size:11px;color:var(--t3);margin-top:7px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}\n\n.info-card{background:#fff;border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}\n.cli{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12.5px}\n.cli:last-child{border-bottom:none}\n.chk{width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;margin-top:2px;font-weight:700}\n.chk.ok{background:var(--green-l);color:var(--green-d)}\n.chk.wa{background:var(--amber-l);color:var(--amber-d)}\n.chk.no{background:var(--red-l);color:var(--red-d)}\n.cli-t{color:var(--t1);line-height:1.4;font-weight:500}\n.cli-s{font-size:11px;color:var(--t3);margin-top:2px;line-height:1.45}\n\n/* TOAST */\n#toast{position:fixed;bottom:22px;right:22px;background:#111;color:#fff;padding:10px 15px;border-radius:8px;font-size:12.5px;display:none;align-items:center;gap:8px;z-index:200;box-shadow:var(--shadow-lg)}\n#toast.show{display:flex;animation:tin .18s ease}\n\n::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:99px}\n\n/* ─── WEEK SELECTOR (E1) ─── */\n.week-sel-wrap{position:relative;display:inline-block}\n.week-sel-btn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 12px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:12.5px;color:var(--t2);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .12s}\n.week-sel-btn:hover{border-color:var(--border2);color:var(--t1);background:var(--surface2)}\n.week-sel-drop{position:absolute;top:calc(100% + 6px);right:0;left:auto;z-index:200;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.10);min-width:240px;padding:6px;display:none}\n.week-sel-opt{padding:8px 12px;border-radius:7px;font-size:12.5px;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:500;transition:background .1s}\n.week-sel-opt:hover{background:var(--surface2)}\n.week-sel-opt.on{background:#F4F4F5;color:var(--t1);font-weight:600}\n.week-sel-opt span{font-size:10.5px;font-family:var(--mono);color:var(--t3)}\n.week-sel-opt.on span{color:var(--t3)}\n\n/* ─── ROLE BADGE (D1) ─── */\n.sb-role{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:3px 9px;background:#F4F4F5;border:1px solid var(--border);border-radius:9999px;font-size:10.5px;font-family:var(--mono);color:#52525B;letter-spacing:.04em;font-weight:500}\n.sb-role-dot{width:6px;height:6px;border-radius:50%;background:#22C55E;flex-shrink:0}\n\n/* ─── REGISTRY FILTER BUTTON & DROPDOWN (B2) ─── */\n.reg-filter-row{display:flex;align-items:center;gap:10px;margin:12px 0 6px;flex-wrap:wrap}\n.reg-filter-btn{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 14px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;color:var(--t2);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .12s;position:relative}\n.reg-filter-btn:hover{border-color:var(--border2);color:var(--t1)}\n.reg-filter-btn.active{border-color:var(--t1);color:var(--t1);background:var(--surface2)}\n.reg-filter-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:99px;background:var(--t1);color:#fff;font-size:10px;font-family:var(--mono);font-weight:700;padding:0 5px}\n.reg-filter-wrap{position:relative}\n.reg-filter-drop{position:absolute;top:calc(100% + 6px);left:0;z-index:200;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.10);width:240px;padding:10px;display:none}\n.reg-filter-drop-h{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);font-weight:600;padding:2px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:6px}\n.rf-check{display:flex;align-items:center;justify-content:space-between;padding:8px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--t2);transition:background .1s;font-weight:500}\n.rf-check:hover{background:var(--surface2)}\n.rf-check input{margin-right:9px;accent-color:var(--teal);width:14px;height:14px;cursor:pointer;flex-shrink:0}\n.rf-check-lbl{display:flex;align-items:center;flex:1}\n.rf-check-cnt{font-family:var(--mono);font-size:10.5px;color:var(--t3);background:var(--surface2);padding:1px 7px;border-radius:99px}\n.reg-filter-clear{margin-top:8px;width:100%;padding:7px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:12px;color:var(--t3);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .12s}\n.reg-filter-clear:hover{background:var(--surface2);color:var(--t2)}\n.reg-active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;min-height:0}\n.reg-active-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 12px;background:var(--teal-l);border:1px solid rgba(24,24,27,.2);border-radius:99px;font-size:12px;color:var(--teal-d);font-weight:500}\n.reg-active-pill button{background:none;border:none;color:var(--teal-d);cursor:pointer;font-size:13px;line-height:1;padding:0;opacity:.7}\n.reg-active-pill button:hover{opacity:1}\n\n/* ─── REGISTRY EMPTY STATE (B1) ─── */\n.reg-empty{display:none;padding:48px 24px;text-align:center}\n.reg-empty-icon{font-size:28px;margin-bottom:10px;opacity:.4}\n.reg-empty-t{font-size:14px;font-weight:500;color:var(--t2);margin-bottom:4px}\n.reg-empty-s{font-size:12.5px;color:var(--t3)}\n\n/* ─── REGISTRY PAGINATION (F1/A3) ─── */\n.reg-pg{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border);background:var(--surface2);flex-wrap:wrap;gap:10px}\n.reg-pg-info{font-family:var(--mono);font-size:11.5px;color:var(--t3);letter-spacing:.02em}\n.reg-pg-controls{display:flex;align-items:center;gap:5px}\n.pg-btn{height:30px;min-width:30px;padding:0 8px;border:1px solid var(--border);border-radius:6px;background:#fff;font-size:12px;font-family:var(--mono);color:var(--t2);cursor:pointer;transition:all .1s;font-weight:500}\n.pg-btn:hover:not(:disabled){background:var(--surface2);border-color:var(--border2);color:var(--t1)}\n.pg-btn.on{background:var(--t1);color:#fff;border-color:var(--t1)}\n.pg-btn:disabled{opacity:.35;cursor:not-allowed}\n#pg-pages{display:flex;gap:4px}\n\n/* ─── H2: Dead-end row full muting ─── */\n.reg-row.dend .rrteam,.reg-row.dend .rrdate{color:var(--t3)}\n\n\n/* ─── COLLAPSIBLE SIDEBAR ─── */\n.sb.collapsed{width:52px;min-width:0}\n.sb-brand{flex:1;overflow:hidden;min-width:0}\n.sb-toggle{display:flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;border:none;background:transparent;cursor:pointer;color:#71717A;flex-shrink:0;padding:0;transition:background .12s,color .12s}\n.sb-toggle:hover{background:#F4F4F5;color:#18181B}\n.sb-toggle svg{transition:transform .22s cubic-bezier(.4,0,.2,1);display:block}\n.sb.collapsed .sb-toggle svg{transform:rotate(180deg)}\n.sb.collapsed .sb-hd{padding:14px 0 10px;border-bottom:none;gap:0;justify-content:center}\n.sb.collapsed .sb-brand{display:none}\n.sb.collapsed .sb-mark{display:none}\n.sb.collapsed .sb-toggle{width:32px;height:32px;border-radius:8px;color:#71717A}\n.sb.collapsed .sb-toggle:hover{background:#F4F4F5;color:#18181B}\n.sb.collapsed .sb-gl,.sb.collapsed .sb-sep,.sb.collapsed .sb-lkl,.sb.collapsed .sbi-t,.sb.collapsed .sbdg,.sb.collapsed .sb-nm,.sb.collapsed .sb-rl{display:none}\n.sb.collapsed .sbi{justify-content:center;padding:9px 0}\n.sb.collapsed .sb-foot{justify-content:center;padding:12px 0}\n.sbi{position:relative}\n.sb.collapsed .sbi::after{content:attr(data-label);position:absolute;left:calc(100% + 10px);top:50%;transform:translateY(-50%);background:#18181B;color:#fff;padding:5px 10px;border-radius:7px;font-size:12px;font-weight:500;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;z-index:500;box-shadow:0 2px 8px rgba(0,0,0,.25)}\n.sb.collapsed .sbi:hover::after{opacity:1}\n\n\n/* ─── UNDERLYING INTELLIGENCE CARDS ─── */\n.ie-section{margin-top:36px;padding-top:28px;border-top:2px solid var(--border)}\n.ie-section-hd{display:flex;align-items:center;gap:10px;margin-bottom:18px}\n.ie-section-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);font-family:var(--mono)}\n.ie-section-cnt{font-family:var(--mono);font-size:10.5px;color:var(--t3);background:var(--surface2);padding:2px 9px;border-radius:99px;font-weight:500}\n.ie-cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:12px}\n.ie-card-item{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:6px;min-height:110px}\n.ie-card-item:hover{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-l);transform:translateY(-1px)}\n.ie-card-item-num{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--teal-d);background:var(--teal-l);padding:2px 8px;border-radius:99px;display:inline-flex;width:fit-content;letter-spacing:.04em}\n.ie-card-item-title{font-size:13px;font-weight:600;color:var(--t1);line-height:1.4;flex:1}\n.ie-card-item-meta{font-size:11.5px;color:var(--t2);font-family:var(--mono);margin-top:2px}\n.ie-card-item-cta{font-size:11px;color:var(--teal-d);font-weight:600;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}\n\n\n.cc-attn-tag{display:flex;align-items:center;gap:6px}\n.cc-attn-tag::before{content:\"\";display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);flex-shrink:0}\n.cc-attn.cr .cc-attn-tag::before{background:var(--red)}\n\n\n/* ─── TIMELINE REDESIGN ─── */\n.tl-list{display:flex;flex-direction:column;gap:0}\n.tl-day-group{display:flex;gap:0;border-bottom:1px solid var(--border);padding:16px 0}\n.tl-day-group:last-child{border-bottom:none}\n.tl-day-hd{width:80px;flex-shrink:0;padding-top:2px}\n.tl-day-name{display:block;font-size:12px;font-weight:700;color:var(--t1);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}\n.tl-day-date{display:block;font-size:11px;color:var(--t3);font-family:var(--mono);margin-top:2px}\n.tl-day-events{flex:1;display:flex;flex-direction:column;gap:8px}\n.tl-event{display:flex;align-items:flex-start;gap:12px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px}\n.tl-event-desc{flex:1;font-size:12.5px;color:var(--t1);line-height:1.5}\n.tl-event-tag{flex-shrink:0;font-family:var(--mono);font-size:10px;color:var(--t3);background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:3px 10px;white-space:nowrap;align-self:flex-start;cursor:pointer;transition:all .12s}\n.tl-event-tag:hover{border-color:var(--teal);color:var(--teal-d)}\n\n.cc-vs-desc{display:block;font-size:10px;font-weight:400;color:var(--t3);text-transform:none;letter-spacing:0;font-family:var(--font);line-height:1.4;margin-top:3px}\n\n\n/* ─── THIS WEEK: DAY CARDS ─── */\n.tl-day-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}\n.tl-day-card:last-child{margin-bottom:0}\n.tl-day-hd{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;align-items:center;gap:8px;width:100%;box-sizing:border-box}\n.tl-day-name{font-size:11px;font-weight:700;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:var(--t1);white-space:nowrap}\n.tl-day-sep{color:var(--t3);font-size:11px}\n.tl-day-date{font-size:11px;font-family:var(--mono);color:var(--t3);white-space:nowrap}\n.tl-day-events{padding:2px 0}\n.tl-ev{display:flex;align-items:flex-start;gap:12px;padding:10px 18px}\n.tl-ev+.tl-ev{border-top:1px solid var(--surface2)}\n.tl-ev-dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0;margin-top:6px}\n.tl-ev-dot.ok{background:var(--green)}\n.tl-ev-dot.cr{background:var(--red)}\n.tl-ev-dot.wa{background:var(--amber)}\n.tl-ev-body{flex:1;font-size:12.5px;color:var(--t1);line-height:1.5}\n.tl-ev-tag{flex-shrink:0;font-family:var(--mono);font-size:10px;color:var(--t3);background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:3px 10px;white-space:nowrap;cursor:pointer;transition:all .12s;align-self:flex-start;margin-top:2px}\n.tl-ev-tag:hover{border-color:var(--teal);color:var(--teal-d)}\n\n\n\n\n/* ─── BAND DISTRIBUTION BAR CHART ─── */\n.bdist-chart{display:flex;gap:12px;align-items:flex-end;height:160px;padding-bottom:0}\n.bdist-col{flex:1;display:flex;flex-direction:column;align-items:stretch;height:100%}\n.bdist-bar-wrap{flex:1;display:flex;align-items:flex-end;border-bottom:2px solid var(--border)}\n.bdist-bar{width:100%;border-radius:6px 6px 0 0;display:flex;align-items:center;justify-content:center;transition:opacity .15s;min-height:28px}\n.bdist-bar:hover{opacity:.85}\n.bdist-count{font-size:14px;font-weight:700;font-family:var(--mono);line-height:1}\n.bdist-lbl{text-align:center;padding-top:10px;display:flex;flex-direction:column;gap:2px}\n.bdist-lbl strong{font-size:13px;color:var(--t1);font-weight:700}\n.bdist-lbl span{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;color:var(--t3)}\n\n\n\n/* ─── TOP AI USER CARDS — OPTION 5 (no watermark) ─── */\n.pc-list{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}\n.pc-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:17px;cursor:default}\n.pc-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}\n.pc-rank-lbl{font-size:9.5px;font-family:var(--mono);font-weight:700;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}\n.pc-name{font-size:15px;font-weight:700;color:var(--t1);line-height:1.2;margin-bottom:3px}\n.pc-team{font-size:10px;font-family:var(--mono);color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}\n.pc-pill{background:var(--teal-l);border-radius:10px;padding:13px 14px;display:flex;align-items:baseline;gap:3px}\n.pc-pill-val{font-size:32px;font-weight:700;color:var(--teal-d);letter-spacing:-.05em;line-height:1}\n.pc-pill-den{font-size:14px;color:#E4E4E7}\n.pc-pill-lbl{font-size:9.5px;font-family:var(--mono);color:var(--teal-d);margin-left:6px;align-self:center;opacity:.8}\n.pc-note{font-size:9.5px;font-family:var(--mono);color:var(--t3);margin-top:11px}\n\n\n/* ─── HEAT MAP ─── */\n.hm-wrap{width:100%}\n.hm-table{border-collapse:separate;border-spacing:5px 4px;table-layout:fixed;width:100%}\n.hm-table th{font-size:10px;font-weight:600;letter-spacing:.04em;color:var(--t2);text-align:center;padding:0 0 4px 0;vertical-align:bottom}\n.hm-table th.hm-team-h{text-align:left;padding:0;width:100px}\n.hm-team-cell{vertical-align:middle;padding-right:6px;width:100px}\n.hm-team-name{font-size:12px;font-weight:700;color:var(--t1);font-family:var(--font);white-space:nowrap}\n.hm-team-sub{font-size:10px;color:var(--t3);margin-top:2px}\n.hm-score{border-radius:8px;padding:11px 2px;font-size:12px;font-weight:700;font-family:var(--mono);text-align:center;vertical-align:middle;line-height:1}\n\n\n.con-viz-bars{display:flex !important;gap:5px !important;align-items:flex-end !important;height:auto !important}\n.con-viz-bar{flex:none !important;width:100%;border-radius:3px;display:flex;align-items:center;\n  justify-content:center;height:24px;font-family:var(--mono);font-size:10px;\n  font-weight:600;letter-spacing:.04em;box-sizing:border-box}\n.con-viz-slot{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:0}\n.con-viz-slot-lbl{font-family:var(--mono);font-size:8px;color:#A1A1AA;letter-spacing:.02em;text-align:center;white-space:nowrap}\n\n/* ════════════════════════════════════════════════════════════\n   SHADCN ALIGNMENT OVERRIDES\n   - Restore green for \"healthy/ok\" semantic spots that previously\n     borrowed the teal accent (now zinc-900) to denote positivity.\n   - Fix sidebar brand mark + avatar to read against the dark\n     zinc-950 sidebar (they were teal blocks).\n   - Polish: focus rings, hairline shadows, secondary surfaces.\n   ════════════════════════════════════════════════════════════ */\n\n/* Sidebar brand mark — zinc-900 tile with white icon (standalone style) */\n.sb-mark svg{stroke:#FAFAFA!important}\n\n/* Sidebar avatar — zinc-900 background, white text */\n.sb-av{background:#18181B;color:#fff}\n\n/* Hero state semantic colors — keep red/amber/green hierarchy */\n.cc-hero-state .ok{color:var(--green-d)}\n.cc-hero-bar-seg.ok{background:#15803D}\n\n/* Trend deltas — green when improving (was teal-d → zinc-900 = same as body) */\n.cc-vs-trend:not(.a):not(.r){color:var(--green-d)}\n\n/* Trend lines / sparklines that originally encoded a positive teal trend —\n   restore them to the standalone green so up-trending charts read as healthy. */\n.cc-vs-tile .cc-vs-spark path[stroke=\"#18181B\"],\n.ap-h-spark path[stroke=\"#18181B\"],\n.intel-spark path[stroke=\"#18181B\"],\n.ic .viz svg path[stroke=\"#18181B\"],\n.ip-card svg path[stroke=\"#18181B\"]:not([stroke-dasharray]){stroke:#15803D}\n.cc-vs-tile .cc-vs-spark path[fill=\"#18181B\"],\n.ap-h-spark path[fill=\"#18181B\"],\n.intel-spark path[fill=\"#18181B\"],\n.ic .viz svg path[fill=\"#18181B\"]{fill:#15803D}\n.cc-vs-tile .cc-vs-spark circle[fill=\"#18181B\"],\n.ap-h-spark circle[fill=\"#18181B\"],\n.intel-spark circle[fill=\"#18181B\"],\n.ic .viz svg circle[fill=\"#18181B\"]{fill:#15803D}\n\n/* Positive-state tags: \"Strong\", \"Healthy\", \"AI-Native\", \"Proficient\",\n   green status pills — use shadcn green (emerald-600 family).\n   Light bg #ECFDF5 + border #A7F3D0 + text #15803D for soft pills;\n   solid #15803D for filled \"Native\". */\n.b.bt{background:#ECFDF5;color:#047857;border:1px solid #A7F3D0}\n.pc-band.prof{background:#ECFDF5;color:#047857;border:1px solid #A7F3D0}\n.pc-band.native{background:#ECFDF5;color:#047857;border:1px solid #A7F3D0}\n.ct-status.g{background:#ECFDF5;color:#047857;border:1px solid #A7F3D0}\n.ic-badge-p.teal{background:#ECFDF5;color:#047857}\n.ie-card-item-num{background:#ECFDF5;color:#047857}\n\n/* \"Good\" status dots and achieved bar fills — green */\n.ct-tile-stat-dot.g{background:#15803D}\n.ctr-dot.g{background:#15803D}\n.ct-tile-score-fil{background:#15803D}\n.ctr-bar-fill{background:#15803D}\n\n/* Low-severity (i.e. healthy / low risk) markers — green */\n.risk-sev.l{background:#15803D}\n.risk-mini.l{border-left-color:#047857}\n.risk-mini.l .risk-mini-tag{color:#047857}\n.con-sev.l{background:#15803D}\n\n/* Recommendation chips marked .g/.a/.r — soft pills matching .b.bt/.ba/.br */\n.dom-card-rec.g,.pc-rec.g{background:#ECFDF5;color:#047857;border:1px solid #A7F3D0}\n.dom-card-rec.a,.pc-rec.a{background:#FEF3C7;color:#B45309;border:1px solid #FDE68A}\n.dom-card-rec.r,.pc-rec.r{background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA}\n\n/* Cohort coaching \"low\" stripe + insights \"teal\" card — green */\n.ch-card.low{border-top-color:#047857}\n.ch-card.low .ch-card-inv{color:#047857}\n.ins-item.teal{background:#ECFDF5;border:1px solid #A7F3D0}\n.ins-ti.teal{color:#047857}\n\n/* Featured promotion candidate accent */\n.pc-card.featured{border-color:#A7F3D0;box-shadow:0 0 0 1px #A7F3D0 inset}\n\n/* Domain card lead stripe — green */\n.dom-card.lead{border-top-color:#047857}\n\n/* Domain depth bar \"g\" variant — green */\n.dom-card-depth-fil.g{background:#15803D}\n\n/* \"Now\" step on audit-posture scale — keep a faint green positive tint */\n.ap-step.now{background:#ECFDF5;border-color:#A7F3D0}\n.ap-step.now .ap-step-lbl,.ap-step.now .ap-step-val{color:var(--green-d)}\n\n/* Investment cards green accent */\n.inv-tag,.inv-met strong,.bn-headline strong,.ap-h-trend,.ap-track-cur,.ct-group-t strong,.ct-tile-pack{color:var(--green-d)}\n\n/* Top-bar active button — shadcn primary */\n.tbb.on{background:#18181B;color:#FAFAFA;border-color:#18181B}\n\n/* Focus polish on inputs */\n.reg-si:focus{border-color:#18181B;box-shadow:0 0 0 3px rgba(24,24,27,.08)}\n\n/* Sidebar role-dot — keep emerald for \"live\" indication */\n.sb-role-dot{background:#22C55E}\n\n/* Tighter Geist tracking on body — shadcn-feel */\nhtml,body{letter-spacing:-.005em}\n\n/* Cards: shadcn shadow-xs hairline */\n.cc-hero,.cc-vs,.cc-attn,.cc-tl,.cc-sep-card,.kpi,.card,.sc,.ic,.sx-card,.sx-tile,.ap-hero,.risk-hero,.risk-mini,.ip-card,.ip-hero,.dom-card,.pc-card,.ch-card,.bn-panel,.ie-card-item,.tl-day-card,.tl-event,.info-card,.insight-card,.prompt-card{box-shadow:0 1px 2px 0 rgba(0,0,0,.04)}\n\n/* Geist numeric: lock to tabular for all mono blocks */\n.cc-vs-val,.kpi-cell-num,.sval,.ip-hero-val,.ap-h-score,.sx-tile-val,.dom-card-depth-v,.pc-id,.bdist-count,.hm-score,.tc-bar,.bbr-val,.pc-dim-num,.risk-hero-step-n,.ap-step-val,.cc-tl-week-total,.cc-hero-stat-val{font-variant-numeric:tabular-nums}\n\n/* ════════════════════════════════════════════════════════════\n   USER REQUEST OVERRIDE — bars / fills / sparklines / accent\n   text / stripes / score pills → BLACK + grayscale only.\n   Status/tag PILLS (.b.bt/.ba/.br, .pc-band.*, .ct-status.*,\n   .stag.*, .contra, .d.dg/dr/da, .ic-badge-p) keep their\n   semantic green/amber/red colors. Heatmap anomaly cells use\n   a single muted amber instead of the bright red ramp.\n   ════════════════════════════════════════════════════════════ */\n\n/* ---- Bar fills: single-context bars → solid black.\n   Ranked bar groups (.br-fil/.bbr-fil) get per-element tier shades\n   set inline via a tier ramp (see HTML), so we don't blanket-override them. ---- */\n.pc-dim-fil,.reg-bd-fil,\n.ctr-bar-fill,.dom-card-depth-fil,\n.ap-track-fill,.cc-tl-week-bar.active,\n.tc-bar{background:#18181B !important}\n.ctr-bar-fill.amber,.dom-card-depth-fil.a,.tc-bar.amber{background:#A1A1AA !important}\n.dom-card-depth-fil.r{background:#3F3F46 !important}\n.reg-bd-fil.dend,.tc-bar.dim{background:#D4D4D8 !important}\n.tc-bar.gray{background:#E4E4E7 !important}\n\n/* Bar fills with inline color → handled per-bar via tiered inline styles\n   (see script-applied edits). Slate-tinted shades remap to the zinc scale. */\n\n/* Stacked viz: first segment + key swatches */\n.viz-stack-seg[style*=\"--teal\"],.viz-stack-seg[style*=\"#15803D\"],\n.viz-stack-key-sw[style*=\"--teal\"],.viz-stack-key-sw[style*=\"#15803D\"]{background:#18181B !important}\n.viz-stack-seg[style*=\"--amber\"],.viz-stack-seg[style*=\"#F59E0B\"],\n.viz-stack-key-sw[style*=\"--amber\"],.viz-stack-key-sw[style*=\"#F59E0B\"]{background:#A1A1AA !important}\n.viz-stack-seg[style*=\"--red\"],.viz-stack-seg[style*=\"#DC2626\"],\n.viz-stack-key-sw[style*=\"--red\"],.viz-stack-key-sw[style*=\"#DC2626\"]{background:#3F3F46 !important}\n\n/* Status dots (NOT tag-pill icons) — grayscale */\n.ctr-dot.g,.ct-tile-stat-dot.g{background:#18181B !important}\n.ctr-dot.a,.ct-tile-stat-dot.a{background:#A1A1AA !important}\n.ctr-dot.n,.ct-tile-stat-dot.n{background:#D4D4D8 !important}\n\n/* ---- Severity stripes / left borders → grayscale ---- */\n.risk-sev.h,.con-sev.h{background:#18181B !important}\n.risk-sev.m,.con-sev.m{background:#71717A !important}\n.risk-sev.l,.con-sev.l{background:#A1A1AA !important}\n.risk-mini{border-left-color:#71717A !important}\n.risk-mini.l{border-left-color:#A1A1AA !important}\n.risk-hero{border-left-color:#18181B !important}\n.dom-card.lead{border-top-color:#18181B !important;background:#fff !important}\n.dom-card.partial{border-top-color:#71717A !important}\n.dom-card.nobid{border-top-color:#3F3F46 !important;background:#fff !important}\n.dom-card.nobid .dom-card-narr{color:var(--t1) !important;font-weight:500}\n.ch-card.high{border-top-color:#18181B !important}\n.ch-card.med{border-top-color:#71717A !important}\n.ch-card.low{border-top-color:#A1A1AA !important}\n.insight-card.clean,.insight-card.watch{border-left-color:#71717A !important}\n\n/* ---- Sparklines / trend lines → black ---- */\n.cc-vs-tile .cc-vs-spark path[stroke=\"#18181B\"],\n.ap-h-spark path[stroke=\"#18181B\"],\n.intel-spark path[stroke=\"#18181B\"],\n.ic .viz svg path[stroke=\"#18181B\"]:not([stroke-dasharray]),\n.ip-card svg path[stroke=\"#18181B\"]:not([stroke-dasharray]){stroke:#18181B !important}\n.cc-vs-tile .cc-vs-spark path[fill=\"#18181B\"],\n.ap-h-spark path[fill=\"#18181B\"],\n.intel-spark path[fill=\"#18181B\"],\n.ic .viz svg path[fill=\"#18181B\"],\n.ip-card svg path[fill=\"#18181B\"]{fill:#18181B !important}\n.cc-vs-tile .cc-vs-spark circle[fill=\"#18181B\"],\n.ap-h-spark circle[fill=\"#18181B\"],\n.intel-spark circle[fill=\"#18181B\"],\n.ic .viz svg circle[fill=\"#18181B\"],\n.ip-card svg circle[fill=\"#18181B\"]{fill:#18181B !important}\n\n/* ---- Accent text → black (not inside tag pills) ---- */\n.cc-vs-trend:not(.a):not(.r),.vzd:not(.a):not(.r),\n.cc-attn-link,.bn-headline strong,\n.inv-tag,.inv-met strong,\n.ap-h-trend,.ap-track-cur,\n.ap-step.now .ap-step-lbl,.ap-step.now .ap-step-val,\n.ct-group-t strong,.ct-tile-pack,\n.ch-card-path,.ch-card.low .ch-card-inv,\n.risk-mini.l .risk-mini-tag,.risk-mini-link,.risk-act,\n.sa-bigstat-v.ok,.sa-guarantee,.sa-guarantee strong,\n.cc-tl-week-bar.active .cc-tl-week-bar-lbl,.cc-tl-day.today,\n.cc-sep-card:hover .cc-sep-arr,\n.sx-card-h-act,.p2-q-lbl,\n.dom-card.nobid .dom-card-narr,\n.delta-up{color:#18181B !important}\n\n/* Amber accent text (medium/watch) → mid-gray (but NOT in tags) */\n.cc-vs-trend.a,.vzd.a,.ch-card.med .ch-card-inv,\n.risk-mini-tag{color:#52525B !important}\n\n/* Red accent text outside tag pills → dark zinc */\n.cc-vs-trend.r,.vzd.r,.ch-card.high .ch-card-inv,\n.risk-hero-tag,.delta-down{color:#27272A !important}\n\n/* ---- \"Audit posture now\" tile → neutralize green tint ---- */\n.ap-step.now{background:#FAFAFA !important;border-color:var(--border) !important}\n\n/* ---- Insights \"teal\" callout card → neutral ---- */\n.ins-item.teal{background:#F4F4F5 !important;border:1px solid var(--border) !important}\n.ins-ti.teal{color:#18181B !important}\n\n/* ---- \"n=1 protection\" reassurance panel → neutral ---- */\n.sa-guarantee{background:#F4F4F5 !important;border-color:var(--border) !important}\n\n/* ---- Top-AI-users score pill (.pc-pill) → neutral tint ---- */\n.pc-pill{background:#F4F4F5 !important}\n.pc-pill-val{color:#18181B !important}\n.pc-pill-den{color:#A1A1AA !important}\n.pc-pill-lbl{color:#52525B !important}\n\n/* ---- Featured promotion candidate accent → subtle gray ring ---- */\n.pc-card.featured{border-color:var(--border) !important;box-shadow:0 0 0 1px var(--border) inset !important}\n\n/* ---- Hero \"6 healthy · 3 watch · 2 critical\" — black-scale per user\n   (replaces the prior tag-like coloring). ---- */\n.cc-hero-state .ok{color:#18181B !important}\n.cc-hero-state .wa{color:#71717A !important}\n.cc-hero-state .cr{color:#3F3F46 !important}\n.cc-hero-bar-seg.ok{background:#18181B !important}\n.cc-hero-bar-seg.wa{background:#71717A !important}\n.cc-hero-bar-seg.cr{background:#3F3F46 !important}\n\n/* ---- Domain × Team Matrix (.hm-cell) — zinc ramp + single anomaly tint ---- */\n.hm-cell[style*=\"#A7F3D0\"]{background:#D4D4D8 !important;color:#18181B !important}\n.hm-cell[style*=\"#F1F5F9\"]{background:#F4F4F5 !important;color:#A1A1AA !important}\n.hm-cell[style*=\"#E2E8F0\"]{background:#E4E4E7 !important;color:#71717A !important}\n.hm-cell[style*=\"#F59E0B\"]{background:#FEF3C7 !important;color:#B45309 !important}\n.hm-cell[style*=\"#15803D\"]{background:#FEF3C7 !important;color:#B45309 !important}\n.hm-cell[style*=\"#DC2626\"]{background:#FEF3C7 !important;color:#B45309 !important}\n\n/* ---- AI skill heat map (.hm-score) — same treatment ---- */\n.hm-score[style*=\"#A7F3D0\"]{background:#D4D4D8 !important;color:#18181B !important}\n.hm-score[style*=\"#F59E0B\"]{background:#FEF3C7 !important;color:#B45309 !important}\n.hm-score[style*=\"#15803D\"]{background:#FEF3C7 !important;color:#B45309 !important}\n.hm-score[style*=\"#DC2626\"]{background:#FEF3C7 !important;color:#B45309 !important}\n\n/* ---- 7-day event log / density bars — grayscale ramp ---- */\n.sa-bar.c-amber{background:#52525B !important}\n.sa-bar.c-amber-dim{background:#A1A1AA !important}\n\n/* ---- Band distribution chart: align the 4th (Foundational) bar to zinc scale ---- */\n.bdist-bar[style*=\"#CBD5E1\"]{background:#D4D4D8 !important}\n.bdist-bar[style*=\"#E2E8F0\"]{background:#D4D4D8 !important}\n.bdist-bar[style*=\"#F1F5F9\"]{background:#E4E4E7 !important}\n\n/* ---- Bar fills using slate scale → align to zinc scale ---- */\n.br-fil[style*=\"#E2E8F0\"],.bbr-fil[style*=\"#E2E8F0\"]{background:#D4D4D8 !important}\n.br-fil[style*=\"#CBD5E1\"],.bbr-fil[style*=\"#CBD5E1\"]{background:#D4D4D8 !important}\n.br-fil[style*=\"#F1F5F9\"],.bbr-fil[style*=\"#F1F5F9\"]{background:#E4E4E7 !important}\n\n/* ---- Heatmap (legacy .heat selector) ---- */\n.cc-redesign .heat .gap-0{background:#F4F4F5 !important;color:#52525B !important}\n.cc-redesign .heat .gap-1{background:#FEF3C7 !important;color:#52525B !important}\n.cc-redesign .heat .gap-2{background:#FEF3C7 !important;color:#52525B !important}\n.cc-redesign .heat .gap-3{background:#FDE68A !important;color:#27272A !important}\n.cc-redesign .heat .gap-4{background:#B45309 !important;color:#fff !important}\n\n/* ---- Concentration viz cells (small bars inside concentration cards) ---- */\n.con-viz-bar.full{background:#18181B !important;color:#fff !important}\n.con-viz-bar.med{background:#A1A1AA !important;color:#fff !important}\n.con-viz-bar.empty{background:#F4F4F5 !important;color:#A1A1AA !important;border:1px solid var(--border)}\n\n/* ---- Risk-hero numbered step circles → black ---- */\n.risk-hero-step-n{background:#18181B !important;color:#fff !important}\n.risk-hero{border-left-color:#18181B !important}\n\n/* ---- Alert items inside intel cards (.al-item) → grayscale ---- */\n.al-item.r,.al-item.a{background:#F4F4F5 !important;border:1px solid var(--border)}\n.ald.r{background:#18181B !important}\n.ald.a{background:#71717A !important}\n.alt.r{color:#18181B !important}\n.alt.a{color:#3F3F46 !important}\n\n/* ---- Inline `color:` SVG text or block accents that hard-coded green/red ---- */\n[style*=\"color:#15803D\"],[style*=\"color: #15803D\"]{color:#18181B !important}\n[style*=\"color:#047857\"],[style*=\"color: #047857\"]{color:#18181B !important}\n[style*=\"color:#B45309\"],[style*=\"color: #B45309\"]{color:#52525B !important}\n[style*=\"color:#B91C1C\"],[style*=\"color: #B91C1C\"]{color:#27272A !important}\n[style*=\"color:var(--teal-d)\"]{color:#18181B !important}\n[style*=\"color:var(--green-d)\"]{color:#18181B !important}\n[style*=\"color:var(--teal)\"]:not([style*=\"--teal-l\"]):not([style*=\"--teal-d\"]){color:#18181B !important}\n[style*=\"color:var(--red-d)\"]{color:#27272A !important}\n[style*=\"color:var(--red)\"]:not([style*=\"--red-d\"]):not([style*=\"--red-l\"]){color:#27272A !important}\n[style*=\"color:var(--amber-d)\"]{color:#52525B !important}\n\n/* ---- Inline background colors with literal green/red/amber → grayscale ---- */\n[style*=\"background:#FCA5A5\"]:not(.b):not(.bt):not(.ba):not(.br){background:#D4D4D8 !important}\n[style*=\"background:#15803D\"]:not(.b):not(.bt):not(.pc-band):not(.ct-status){background:#18181B !important}\n\n/* ---- SVG legend swatch boxes inline-styled with semantic colors ---- */\n.ip-card span[style*=\"background:#15803D\"]{background:#18181B !important}\n.ip-card span[style*=\"background:#F59E0B\"]{background:#A1A1AA !important}\n.ip-card span[style*=\"background:#DC2626\"]{background:#3F3F46 !important}\n\n/* ---- SVG chart elements with literal semantic colors → grayscale ---- */\nsvg path[stroke=\"#15803D\"],svg path[fill=\"#15803D\"],svg circle[fill=\"#15803D\"],svg rect[fill=\"#15803D\"],svg line[stroke=\"#15803D\"],svg text[fill=\"#15803D\"]{stroke:#18181B;fill:#18181B}\nsvg path[stroke=\"#F59E0B\"],svg path[fill=\"#F59E0B\"],svg circle[fill=\"#F59E0B\"],svg rect[fill=\"#F59E0B\"],svg line[stroke=\"#F59E0B\"]{stroke:#A1A1AA !important;fill:#A1A1AA !important}\nsvg text[fill=\"#F59E0B\"]{fill:#52525B !important;stroke:none !important}\nsvg path[stroke=\"#DC2626\"],svg path[fill=\"#DC2626\"],svg circle[fill=\"#DC2626\"],svg rect[fill=\"#DC2626\"],svg line[stroke=\"#DC2626\"]{stroke:#3F3F46 !important;fill:#3F3F46 !important}\nsvg text[fill=\"#DC2626\"]{fill:#27272A !important;stroke:n
